function showCopyrightNotice() {
  const existing = document.getElementById('copyright-toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'copyright-toast';
  toast.textContent = COPYRIGHT_NOTICE;
  toast.style.cssText = 'position:fixed;right:16px;bottom:16px;z-index:99999;background:#004030;color:#fff;padding:10px 14px;border-radius:12px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.18);opacity:.98';

}

document.addEventListener('keydown', (e) => {
  const key = (e.key || '').toLowerCase();
  const ctrlOrMeta = e.ctrlKey || e.metaKey;
  const blocked = key === 'f12' || (ctrlOrMeta && key === 'u') || (ctrlOrMeta && e.shiftKey && ['i', 'j', 'c'].includes(key));
  if (blocked) {
    e.preventDefault();
    e.stopPropagation();
    showCopyrightNotice();
  }
});

document.addEventListener('contextmenu', (e) => {
  const selection = window.getSelection ? String(window.getSelection()).trim() : '';
  if (selection) return;
  const t = e.target;
  if (t && (t.closest('img') || t.closest('.protected-graphic') || t.closest('svg.protected-graphic'))) {
    e.preventDefault();
    showCopyrightNotice();
    return;
  }
  if (t && (t.closest('header') || t.closest('footer') || !t.closest('.markdown-body'))) {
    e.preventDefault();
    showCopyrightNotice();
  }
});

const { useState, useEffect } = React;
const API_BASE = 'https://smmc-strategy-api.smlo.workers.dev';

function friendlyHttpError(status, payload = {}) {
  const msg = payload?.error || payload?.message || '';
  if (status === 401) return '登入驗證失敗（401）。請重新確認 Token。';
  if (status === 403) return '你沒有執行此操作的權限（403）。';
  if (status === 429) return msg || '請求過多或 Gemini 配額不足（429）。請稍後再試，或縮小檢索範圍。';
  if (status >= 500) return msg || `伺服器錯誤（${status}）。`;
  return msg || `HTTP ${status}`;
}

function safeParseJson(text) {
  try {
    return JSON.parse(text);
  } catch {
    return null;
  }
}

function sanitizeHtml(html) {
  if (!window.DOMPurify) return html;
  return window.DOMPurify.sanitize(html, {
    USE_PROFILES: { html: true },
    ALLOWED_URI_REGEXP: /^(?:(?:https?|mailto|tel):|[^a-z]|[a-z+.-]+(?:[^a-z+.-:]|$))/i,
  });
}

function renderMarkdown(md) {
  return sanitizeHtml(marked.parse(md || ''));
}

function sanitizeCsvField(value, maxLen = 40) {
  return String(value || '').replace(/[=+\-@]/g, '').replace(/[<>]/g, '').trim().slice(0, maxLen);
}

async function fetchWithTimeout(url, options = {}, timeoutMs = 25000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    return await fetch(url, { ...options, signal: controller.signal });
  } finally {
    clearTimeout(timer);
  }
}

const api = async (action, data = {}, token = '') => {
  const resp = await fetchWithTimeout(API_BASE + '/api', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, token, ...data }),
  });

  const raw = await resp.text();
  const payload = safeParseJson(raw) || {};

  if (!resp.ok) {
    throw new Error(friendlyHttpError(resp.status, payload));
  }
  return payload;
};

const apiSSE = async (data, token, onEvent) => {
  const resp = await fetchWithTimeout(API_BASE + '/api', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'analyze', token, ...data }),
  }, 60000);

  if (!resp.ok) {
    const raw = await resp.text();
    const payload = safeParseJson(raw) || {};
    throw new Error(friendlyHttpError(resp.status, payload));
  }

  if (!resp.body) throw new Error('SSE response body is empty.');

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let result = null;

  while (true) {
    const { done, value } = await reader.read();
    if (done) return result;

    buffer += decoder.decode(value, { stream: true });
    const events = buffer.split('\n\n');
    buffer = events.pop() || '';

    for (const chunk of events) {
      const line = chunk.split('\n').find(l => l.startsWith('data: '));
      if (!line) continue;
      const evt = safeParseJson(line.slice(6));
      if (!evt) continue;
      if (evt.type === 'react_complete') result = evt;
      if (evt.type === 'react_fatal') throw new Error(evt.error || 'Analyze failed');
      if (evt.type !== 'stream_end' && typeof onEvent === 'function') onEvent(evt);
    }
  }
};

function LoginScreen({ onLogin, lang, setLang }) {
  const [token, setToken] = useState('');
  const [group, setGroup] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [isDark, setIsDark] = useState(false);
  const t = dict[lang];
  const groups = ['G1','G2','G3','G4','G5','G6','G7','G8','G9','G10','G11','G12'];

  useEffect(() => {
    document.documentElement.classList.toggle('dark', isDark);
  }, [isDark]);

  const handleLogin = async () => {
    if (!token.trim()) return;
    setLoading(true);
    setError('');
    try {
      const res = await api('auth', {}, token);
      if (res.ok) {
        const role = res.role || 'student';
        const finalGroup = role === 'student' ? group : (res.group || '');
        if (role === 'student' && !group) {
          setError(lang === 'zh' ? '請選擇組別' : 'Please select a group');
          setLoading(false);
          return;
        }
        onLogin(token, role, finalGroup, res.label || '');
      } else {
        setError(res.error || t.login_err);
      }
    } catch (e) {
      setError(e.message || t.login_err);
    }
    setLoading(false);
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-[#f4f4f4] dark:bg-[#121212]">
      <div className="w-full max-w-md animate-fade-in">
        <div className="text-center mb-8">
          <div className="inline-flex items-center gap-3 mb-4">
            <div className="p-3 bg-primary/10 dark:bg-secondary/10 rounded-xl"><IconBot /></div>
            <span className="font-serif font-black text-3xl tracking-widest text-primary dark:text-secondary">{t.brand}</span>
          </div>
          <h1 className="font-serif font-bold text-xl text-primary dark:text-secondary">{t.title}</h1>
          <p className="text-sm text-slate-500 mt-1">{t.subtitle}</p>
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-2xl p-8 border border-slate-200 dark:border-slate-700 shadow-lg">
          <div className="flex items-center gap-3 mb-6"><IconLock /><h2 className="font-serif font-bold text-lg text-primary dark:text-secondary">{t.login_title}</h2></div>
          <input type="password" value={token} onChange={e => setToken(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin()} placeholder={t.login_ph} className="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-primary/50 outline-none transition-all dark:text-white mb-4" />
          <div className="mb-4">
            <label className="text-sm font-medium text-slate-600 dark:text-slate-400 mb-1 block">{lang === 'zh' ? '組別 (學生必選)' : 'Group (required for students)'}</label>
            <select value={group} onChange={e => setGroup(e.target.value)} className="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-primary/50 outline-none dark:text-white">
              <option value="">{lang === 'zh' ? '— 請選擇組別 —' : '— Select group —'}</option>
              {groups.map(g => <option key={g} value={g}>{g}</option>)}
              <option value="TA">TA</option>
              <option value="Professor">Professor</option>
            </select>
          </div>
          {error && <p className="text-red-500 text-sm mb-4 flex items-center gap-1"><IconAlert />{error}</p>}
          <button onClick={handleLogin} disabled={loading || !token.trim()} className="w-full py-3 rounded-xl font-bold bg-primary dark:bg-secondary text-white dark:text-primary hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed shadow-md flex justify-center items-center gap-2">{loading ? <><IconLoader /> {t.processing}</> : t.login_btn}</button>
          <p className="text-xs text-slate-400 mt-4 text-center">{t.login_hint}</p>
        </div>
        <div className="flex justify-center gap-2 mt-6">
          <button onClick={() => setLang(l => l === 'zh' ? 'en' : 'zh')} className="px-3 py-1.5 text-xs font-bold bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50">{lang === 'zh' ? 'EN' : '中文'}</button>
          <button onClick={() => setIsDark(d => !d)} className="p-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50">{isDark ? <IconSun /> : <IconMoon />}</button>
        </div>
      </div>
    </div>
  );
}

function AdminPanel({ authToken, lang, t }) {
  const [cleanupDays, setCleanupDays] = useState(90);
  const [cleanupKeepReports, setCleanupKeepReports] = useState(20);
  const [adminTab, setAdminTab] = useState('tokens');
  const [tokens, setTokens] = useState([]);
  const [kbStats, setKbStats] = useState(null);
  const [usageStats, setUsageStats] = useState(null);
  const [loading, setLoading] = useState(false);
  const [newRole, setNewRole] = useState('student');
  const [newTokenVal, setNewTokenVal] = useState('');
  const [newLabel, setNewLabel] = useState('');
  const [newLimit, setNewLimit] = useState(10);
  const [newExpiry, setNewExpiry] = useState('');

  const loadTokens = async () => { setLoading(true); try { const r = await api('admin_get_tokens', {}, authToken); if (r.ok) setTokens(r.tokens || []); } catch (e) {} setLoading(false); };
  const loadKB = async () => { setLoading(true); try { const r = await api('admin_kb_stats', {}, authToken); if (r.ok) setKbStats(r); } catch (e) {} setLoading(false); };
  const loadUsage = async () => { setLoading(true); try { const r = await api('admin_usage_stats', {}, authToken); if (r.ok) setUsageStats(r); } catch (e) {} setLoading(false); };

  useEffect(() => {
    if (adminTab === 'tokens') loadTokens();
    else if (adminTab === 'kb') loadKB();
    else if (adminTab === 'usage') loadUsage();
  }, [adminTab]);

  const addToken = async () => {
    if (!newTokenVal.trim()) return;
    await api('admin_set_token', { role: newRole, tokenValue: newTokenVal, label: newLabel, dailyLimit: newLimit, expiresAt: newExpiry || '' }, authToken);
    setNewTokenVal('');
    setNewLabel('');
    loadTokens();
  };

  const deleteToken = async (id) => {
    if (!confirm(lang === 'zh' ? '確定刪除此 Token？' : 'Delete this token?')) return;
    await api('admin_delete_token', { tokenId: id }, authToken);
    loadTokens();
  };

  const clearKB = async (company) => {
    const msg = company ? `清除「${company}」的知識庫？` : '清除全部知識庫？此操作不可復原。';
    if (!confirm(msg)) return;
    await api('admin_clear_kb', { company: company || undefined }, authToken);
    loadKB();
  };

  const pruneUsageLog = async () => {
    const msg = lang === 'zh' ? `清除 ${cleanupDays} 天前的 usage_log？` : `Delete usage_log older than ${cleanupDays} days?`;
    if (!confirm(msg)) return;
    await api('admin_prune_usage_log', { days: cleanupDays }, authToken);
    loadUsage();
  };

  const pruneReports = async () => {
    const msg = lang === 'zh' ? `每組只保留最近 ${cleanupKeepReports} 份報告，繼續？` : `Keep only the latest ${cleanupKeepReports} reports per group?`;
    if (!confirm(msg)) return;
    await api('admin_prune_reports', { keep: cleanupKeepReports }, authToken);
    loadUsage();
  };

  const pruneKB = async () => {
    const msg = lang === 'zh' ? `刪除 ${cleanupDays} 天前的 knowledge_base，並清掉 low relevance，繼續？` : `Delete knowledge_base older than ${cleanupDays} days and low relevance rows?`;
    if (!confirm(msg)) return;
    await api('admin_prune_kb', { days: cleanupDays }, authToken);
    loadKB();
  };

  const tabBtn = (id, label) => (
    <button onClick={() => setAdminTab(id)} className={`px-4 py-2 text-sm font-bold rounded-lg transition-all ${adminTab === id ? 'bg-primary text-white dark:bg-secondary dark:text-primary' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>{label}</button>
  );

  return (
    <div className="animate-fade-in space-y-6">
      <div className="bg-amber-50 dark:bg-amber-900/10 border-2 border-amber-300 dark:border-amber-700 rounded-2xl p-5 mb-4 shadow-sm">
        <div className="flex items-start justify-between gap-4 flex-wrap mb-4">
          <div>
            <h3 className="font-serif font-bold text-lg text-amber-900 dark:text-amber-200">{lang === 'zh' ? '資料清理工具' : 'Data Cleanup Tools'}</h3>
            <p className="text-xs text-amber-800/80 dark:text-amber-200/80 mt-1">{lang === 'zh' ? '用來清除舊的使用紀錄、知識庫資料與歷史報告。此操作會直接影響 D1 資料庫。' : 'Use these tools to delete old usage logs, knowledge base entries, and historical reports from D1.'}</p>
          </div>
          <span className="px-3 py-1 rounded-full text-[11px] font-bold bg-amber-200 text-amber-900 dark:bg-amber-800/60 dark:text-amber-100">ADMIN ONLY</span>
        </div>

        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3 items-end">
          <label className="text-sm lg:col-span-1">
            <span className="block text-slate-600 dark:text-slate-300 mb-1 font-medium">{lang === 'zh' ? '保留天數' : 'Retention days'}</span>
            <input type="number" min="1" value={cleanupDays} onChange={e => setCleanupDays(Number(e.target.value) || 90)} className="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-sm dark:text-white" />
          </label>
          <label className="text-sm lg:col-span-1">
            <span className="block text-slate-600 dark:text-slate-300 mb-1 font-medium">{lang === 'zh' ? '每組保留報告' : 'Keep reports/group'}</span>
            <input type="number" min="1" value={cleanupKeepReports} onChange={e => setCleanupKeepReports(Number(e.target.value) || 20)} className="w-full px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-sm dark:text-white" />
          </label>
          <button onClick={pruneUsageLog} className="px-3 py-2.5 rounded-lg text-xs font-bold bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 border border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700">{lang === 'zh' ? '清 usage_log' : 'Prune usage_log'}</button>
          <button onClick={pruneKB} className="px-3 py-2.5 rounded-lg text-xs font-bold bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 border border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700">{lang === 'zh' ? '清 knowledge_base' : 'Prune KB'}</button>
          <button onClick={pruneReports} className="px-3 py-2.5 rounded-lg text-xs font-bold bg-red-600 text-white hover:bg-red-700 border border-red-700">{lang === 'zh' ? '清 reports' : 'Prune reports'}</button>
        </div>
      </div>

      <div className="flex gap-2 flex-wrap">
        {tabBtn('tokens', lang === 'zh' ? 'Token 管理' : 'Token Management')}
        {tabBtn('kb', lang === 'zh' ? '知識庫統計' : 'KB Stats')}
        {tabBtn('usage', lang === 'zh' ? '使用量統計' : 'Usage Stats')}
      </div>

      {adminTab === 'tokens' && (
        <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm">
          <h3 className="font-serif font-bold text-primary dark:text-secondary text-lg mb-4">{lang === 'zh' ? 'Token 管理' : 'Token Management'}</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3 mb-6 p-4 bg-slate-50 dark:bg-slate-900/50 rounded-xl border border-slate-200 dark:border-slate-700">
            <select value={newRole} onChange={e => setNewRole(e.target.value)} className="px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-sm dark:text-white">
              <option value="student">Student</option>
              <option value="ta">TA</option>
            </select>
            <input placeholder="Token value" value={newTokenVal} onChange={e => setNewTokenVal(e.target.value)} className="px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-sm dark:text-white" />
            <input placeholder={lang === 'zh' ? '標籤 (如 全班/TA姓名)' : 'Label'} value={newLabel} onChange={e => setNewLabel(e.target.value)} className="px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-sm dark:text-white" />
            <div className="flex items-center gap-2">
              <input type="number" min="1" max="100" value={newLimit} onChange={e => setNewLimit(Number(e.target.value))} className="w-20 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-sm dark:text-white" />
              <span className="text-xs text-slate-400">{lang === 'zh' ? '次/天' : '/day'}</span>
            </div>
            <div className="flex gap-2">
              <input type="date" value={newExpiry} onChange={e => setNewExpiry(e.target.value)} className="flex-1 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-sm dark:text-white" />
              <button onClick={addToken} className="px-4 py-2 bg-primary dark:bg-secondary text-white dark:text-primary rounded-lg text-sm font-bold hover:opacity-90 shrink-0">+</button>
            </div>
          </div>
          {loading ? <p className="text-center text-slate-400 py-4"><IconLoader /></p> : (
            <div className="space-y-2">
              {tokens.length === 0 ? <p className="text-slate-400 text-sm text-center py-4">{lang === 'zh' ? '尚未設定任何 Token。' : 'No tokens set yet.'}</p> : tokens.map(tk => (
                <div key={tk.id} className="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-700/50 rounded-lg border border-slate-200 dark:border-slate-600 text-sm">
                  <div className="flex items-center gap-3 flex-wrap">
                    <span className={`px-2 py-0.5 rounded text-xs font-bold ${tk.role === 'ta' ? 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300' : 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300'}`}>{tk.role.toUpperCase()}</span>
                    <span className="font-mono text-xs text-slate-500">{tk.token_value}</span>
                    {tk.label && <span className="text-xs text-slate-400">({tk.label})</span>}
                    <span className="text-xs text-slate-400">{tk.daily_limit}{lang === 'zh' ? '次/天' : '/day'}</span>
                    {tk.expires_at && <span className="text-xs text-amber-600">{lang === 'zh' ? '到期' : 'exp'}: {String(tk.expires_at).slice(0, 10)}</span>}
                  </div>
                  <button onClick={() => deleteToken(tk.id)} className="text-red-400 hover:text-red-600 text-xs font-bold px-2">✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {adminTab === 'kb' && kbStats && (
        <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm">
          <h3 className="font-serif font-bold text-primary dark:text-secondary text-lg mb-4">{lang === 'zh' ? '知識庫統計' : 'Knowledge Base Stats'}</h3>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
            <div className="bg-slate-50 dark:bg-slate-900/50 rounded-xl p-4 text-center"><p className="text-2xl font-bold text-primary dark:text-secondary">{kbStats.total}</p><p className="text-xs text-slate-400 mt-1">{lang === 'zh' ? '總筆數' : 'Total entries'}</p></div>
            {(kbStats.byCategory || []).map((c, i) => <div key={i} className="bg-slate-50 dark:bg-slate-900/50 rounded-xl p-4 text-center"><p className="text-xl font-bold text-slate-600 dark:text-slate-300">{c.cnt}</p><p className="text-xs text-slate-400 mt-1">{c.category}</p></div>)}
          </div>
          <div className="space-y-2 max-h-64 overflow-y-auto">
            {(kbStats.byCompany || []).map((c, i) => <div key={i} className="flex items-center justify-between p-2 bg-slate-50 dark:bg-slate-700/50 rounded-lg text-sm"><span><span className="font-bold">{c.company}</span> <span className="text-xs text-slate-400 ml-2">[{c.category}]</span></span><div className="flex items-center gap-2"><span className="text-xs text-slate-400">{c.cnt}</span><button onClick={() => clearKB(c.company)} className="text-red-400 hover:text-red-600 text-xs px-2">🗑</button></div></div>)}
          </div>
          <button onClick={() => clearKB(null)} className="mt-4 px-4 py-2 bg-red-100 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-lg text-sm font-bold hover:bg-red-200 dark:hover:bg-red-900/40">{lang === 'zh' ? '清除全部知識庫' : 'Clear all KB'}</button>
        </div>
      )}

      {adminTab === 'usage' && usageStats && (
        <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm">
          <h3 className="font-serif font-bold text-primary dark:text-secondary text-lg mb-4">{lang === 'zh' ? '使用量統計' : 'Usage Statistics'}</h3>
          <h4 className="font-bold text-sm text-slate-600 dark:text-slate-400 mb-3">{lang === 'zh' ? '今日使用量' : 'Today'}</h4>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
            {(usageStats.today || []).map((u, i) => <div key={i} className="bg-slate-50 dark:bg-slate-900/50 rounded-xl p-4 text-center"><p className="text-xl font-bold text-primary dark:text-secondary">{u.cnt}</p><p className="text-xs text-slate-400 mt-1">{u.owner_group}</p></div>)}
          </div>
          <h4 className="font-bold text-sm text-slate-600 dark:text-slate-400 mb-3">{lang === 'zh' ? '累計使用量' : 'Total'}</h4>
          <div className="space-y-2">
            {(usageStats.total || []).map((u, i) => <div key={i} className="flex items-center justify-between p-2 bg-slate-50 dark:bg-slate-700/50 rounded-lg text-sm"><span className="font-bold">{u.owner_group}</span><span className="text-xs text-slate-400">{u.cnt}</span></div>)}
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [authToken, setAuthToken] = useState(() => sessionStorage.getItem('smmc_token') || '');
  const [userRole, setUserRole] = useState(() => sessionStorage.getItem('smmc_role') || '');
  const [userGroup, setUserGroup] = useState(() => sessionStorage.getItem('smmc_group') || '');
  const [lang, setLang] = useState('zh');
  const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
  const [isDark, setIsDark] = useState(false);
  const [company, setCompany] = useState('');
  const [optNews, setOptNews] = useState(true);
  const [newsYears, setNewsYears] = useState(3);
  const [optIR, setOptIR] = useState(true);
  const [optFile, setOptFile] = useState(false);
  const [uploadedFiles, setUploadedFiles] = useState([]);
  const [activeReminder, setActiveReminder] = useState(null);
  const [activeTab, setActiveTab] = useState('new');
  const [workflowState, setWorkflowState] = useState('idle');
  const [ragContext, setRagContext] = useState('');
  const [errorMsg, setErrorMsg] = useState('');
  const [reports, setReports] = useState({ agent1: '', agent2: '', agent3: '' });
  const [savedMsg, setSavedMsg] = useState('');
  const [reactLog, setReactLog] = useState([]);
  const [traces, setTraces] = useState({ agent1: [], agent2: [], agent3: [] });
  const [historyList, setHistoryList] = useState([]);
  const [historySearch, setHistorySearch] = useState('');
  const [historyLoading, setHistoryLoading] = useState(false);
  const [viewingReport, setViewingReport] = useState(null);

  const t = dict[lang];
  const isAdmin = userRole === 'admin';
  const isTA = userRole === 'ta';
  const canSeeTrace = isAdmin || isTA;
  const canExport = isAdmin;
  const isWorking = !['idle', 'done', 'error'].includes(workflowState);

  useEffect(() => {
    document.documentElement.classList.toggle('dark', isDark);
  }, [isDark]);

  useEffect(() => {
    if (activeTab === 'history' && authToken) loadHistory();
  }, [activeTab]);

  const handleLogin = (token, role, group) => {
    setAuthToken(token);
    setUserRole(role);
    setUserGroup(group);
    sessionStorage.setItem('smmc_token', token);
    sessionStorage.setItem('smmc_role', role);
    sessionStorage.setItem('smmc_group', group);
  };

  const handleLogout = () => {
    setAuthToken('');
    setUserRole('');
    setUserGroup('');
    sessionStorage.removeItem('smmc_token');
    sessionStorage.removeItem('smmc_role');
    sessionStorage.removeItem('smmc_group');
  };

  const loadHistory = async () => {
    setHistoryLoading(true);
    try {
      const res = await api('list_reports', { company: historySearch || undefined, role: userRole, group: userGroup }, authToken);
      if (res.ok) setHistoryList(res.reports || []);
    } catch (err) {
      console.error(err);
    }
    setHistoryLoading(false);
  };

  const loadReport = async (reportId) => {
    try {
      const res = await api('get_report', { reportId }, authToken);
      if (res.ok && res.report) {
        setViewingReport(res.report);
        setReports({ agent1: res.report.agent1 || '', agent2: res.report.agent2 || '', agent3: res.report.agent3 || '' });
        setTraces({
          agent1: safeParseJson(res.report.agent1_trace) || [],
          agent2: safeParseJson(res.report.agent2_trace) || [],
          agent3: safeParseJson(res.report.agent3_trace) || [],
        });
        setCompany(res.report.company || '');
        setRagContext(res.report.rag_context || '');
        setWorkflowState('done');
        setActiveTab('new');
      }
    } catch (err) {
      console.error(err);
    }
  };

  const handleFileUpload = (e) => {
    const SUPPORTED_EXT = /\.(txt|md|csv|json|pdf|docx?|xlsx?|pptx?)$/i;
    const MAX_FILES = 5;
    const MAX_FILE_BYTES = 10 * 1024 * 1024;
    const files = Array.from(e.target.files || []).filter(f => SUPPORTED_EXT.test(f.name)).slice(0, MAX_FILES);
    const oversized = files.find(f => f.size > MAX_FILE_BYTES);
    if (oversized) {
      setErrorMsg(`${lang === 'zh' ? '檔案過大，單檔上限 10MB：' : 'File too large, max 10MB each: '}${oversized.name}`);
      return;
    }
    if (!files.length) {
      setUploadedFiles([]);
      return;
    }

    const promises = files.map(file => new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const result = typeof ev.target?.result === 'string' ? ev.target.result : '';
        const base64 = result.includes(',') ? result.split(',')[1] : '';
        resolve({ fileName: file.name, fileType: file.type || 'application/octet-stream', fileBase64: base64 });
      };
      reader.readAsDataURL(file);
    }));

    Promise.all(promises).then(setUploadedFiles);
  };

  const exportReport = () => {
    const content = `# ${company} 企業策略綜合分析報告\n\n> 報告產出時間：${new Date().toLocaleString()}\n> 架構：Single-Pass 3-Agent\n\n## ${t.agent1}\n${reports.agent1}\n\n## ${t.agent2}\n${reports.agent2}\n\n## ${t.agent3}\n${reports.agent3}\n`;
    const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${company || 'report'}_SMMC策略分析報告.md`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  const exportPDF = () => {
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${company}</title><style>body{font-family:Arial,sans-serif;padding:32px;color:#222} h1,h2{color:#004030} .badge{display:inline-block;padding:6px 12px;border-radius:999px;background:#eef2ff;margin:16px 0 8px;font-weight:700} .a1{background:#dbeafe;color:#1e40af}.a2{background:#ede9fe;color:#6d28d9}.a3{background:#dcfce7;color:#166534}</style></head><body><h1>${company}</h1><p>Generated: ${new Date().toLocaleString()}</p><div class="badge a1">${t.agent1}</div>${renderMarkdown(reports.agent1 || '')}<div class="badge a2">${t.agent2}</div>${renderMarkdown(reports.agent2 || '')}<div class="badge a3">${t.agent3}</div>${renderMarkdown(reports.agent3 || '')}</body></html>`;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const w = window.open(url, '_blank');
    if (w) w.onload = () => setTimeout(() => w.print(), 500);
  };

  const runWorkflow = async () => {
    const trimmedCompany = sanitizeCsvField(company, 80);
    if (!trimmedCompany) {
      setErrorMsg(t.err_empty);
      return;
    }

    setErrorMsg('');
    setSavedMsg('');
    setViewingReport(null);
    setReports({ agent1: '', agent2: '', agent3: '' });
    setTraces({ agent1: [], agent2: [], agent3: [] });
    setReactLog([]);

    const addLog = (icon, msg) => setReactLog(prev => [...prev, { time: new Date().toLocaleTimeString(), icon, msg }]);
    const collectedReports = { agent1: '', agent2: '', agent3: '' };
    const collectedTraces = { agent1: [], agent2: [], agent3: [] };

    const handleEvent = (evt) => {
      switch (evt.type) {
        case 'react_thinking':
          addLog('🧠', `${evt.agentId} — Round ${evt.round || 1}/${evt.maxRounds || 1} 思考中...`);
          break;
        case 'react_action': {
          const icons = { single_pass: '🧠', search: '🔍', lookup_kb: '📚', calculate: '🔢' };
          addLog(icons[evt.action] || '⚙️', `${evt.agentId} → ${evt.action}${evt.input ? `(\"${evt.input}\")` : ''}`);
          break;
        }
        case 'react_thought':
          addLog('💭', `${evt.agentId} — ${evt.thought}`);
          break;
        case 'react_observation':
          addLog('📋', `${evt.agentId} ← ${evt.observation}`);
          break;
        case 'react_finish':
          addLog('✅', `${evt.agentId} — 完成`);
          break;
        case 'react_error':
          addLog('⚠️', `${evt.agentId} — ${evt.error}`);
          break;
        default:
          break;
      }
    };

    try {
      if (optNews || optIR) {
        setWorkflowState('search');
        addLog('🌐', lang === 'zh' ? `線上搜尋「${trimmedCompany}」資料中...` : `Searching \"${trimmedCompany}\" online...`);
        await api('search', { company: trimmedCompany, optNews, newsYears, optIR, lang }, authToken);
      }

      if (optFile && uploadedFiles.length > 0) {
        addLog('📎', lang === 'zh' ? `上傳 ${uploadedFiles.length} 個檔案...` : `Uploading ${uploadedFiles.length} files...`);
        for (const f of uploadedFiles) {
          try {
            await api('file_upload', { company: trimmedCompany, fileName: f.fileName, fileType: f.fileType, fileBase64: f.fileBase64 }, authToken);
            addLog('✅', `${f.fileName} ${lang === 'zh' ? '解析完成' : 'parsed'}`);
          } catch (err) {
            addLog('⚠️', `${f.fileName} ${lang === 'zh' ? '解析失敗' : 'failed'}: ${err.message}`);
          }
        }
      }

      setWorkflowState('rag');
      addLog('🔍', lang === 'zh' ? '檢索知識庫...' : 'Retrieving knowledge base...');
      const ragRes = await api('rag_retrieve', { company: trimmedCompany }, authToken);
      const context = ragRes.context || (lang === 'zh' ? '知識庫無相符資料。' : 'No data found in KB.');
      setRagContext(context);

      const langStr = lang === 'zh' ? '繁體中文（台灣用語）' : 'English';
      let optPrompt = '';
      if (optNews) optPrompt += `\n- 著重整合過去 ${newsYears} 年新聞與市場動態。`;
      if (optIR) optPrompt += '\n- 著重官方網站與 IR 公開資訊。';

      setWorkflowState('agent1');
      addLog('🚀', 'Agent 1 啟動');
      const r1 = await apiSSE({
        company: trimmedCompany,
        agentId: 'agent1',
        agentRole: '資深總體經濟與產業分析師',
        taskPrompt: `分析對象: ${trimmedCompany}。\n${optPrompt}\n【任務】：\n1. TP0: 摘要公司歷史、願景與近年財務表現。\n2. TP1: PESTEL 分析（挑最關鍵 2-3 項）。\n3. TP1: 五力分析與產業價值鏈定位。\n4. 歸納 4P (Position, Priority, Posture, Profit potential)。\n語言：${langStr}`,
        ragContext: context,
      }, authToken, handleEvent);
      if (r1) {
        collectedReports.agent1 = r1.report || '';
        collectedTraces.agent1 = r1.trace || [];
        setReports(prev => ({ ...prev, agent1: r1.report || '' }));
        setTraces(prev => ({ ...prev, agent1: r1.trace || [] }));
      }

      setWorkflowState('agent2');
      addLog('🚀', 'Agent 2 啟動');
      const r2 = await apiSSE({
        company: trimmedCompany,
        agentId: 'agent2',
        agentRole: '資深企業資源與價值鏈精算師',
        taskPrompt: `分析對象: ${trimmedCompany}。\n【Agent 1 節錄】：${(collectedReports.agent1 || '').substring(0, 1500)}...\n【任務】：\n1. TP2: 核心事業與營收流向。\n2. TP2: 企業價值鏈拆解。\n3. TP2: 3-4 個關鍵資源 VRIN 評估。\n4. TP2: 動態能力 (Dynamic Capabilities)。\n語言：${langStr}`,
        ragContext: context,
      }, authToken, handleEvent);
      if (r2) {
        collectedReports.agent2 = r2.report || '';
        collectedTraces.agent2 = r2.trace || [];
        setReports(prev => ({ ...prev, agent2: r2.report || '' }));
        setTraces(prev => ({ ...prev, agent2: r2.trace || [] }));
      }

      setWorkflowState('agent3');
      addLog('🚀', 'Agent 3 啟動');
      const r3 = await apiSSE({
        company: trimmedCompany,
        agentId: 'agent3',
        agentRole: '頂尖集團策略長 (CSO)',
        taskPrompt: `分析對象: ${trimmedCompany}。\n【Agent 1 節錄】：${(collectedReports.agent1 || '').substring(0, 1000)}...\n【Agent 2 節錄】：${(collectedReports.agent2 || '').substring(0, 1000)}...\n【任務】：\n1. TP3: 垂直整合/多角化/地理擴張的策略行動與進入模式。\n2. TP3: 2-3 點未來挑戰與高階策略建議。\n3. 考量 ESG、Agency problem。\n語言：${langStr}`,
        ragContext: context,
      }, authToken, handleEvent);
      if (r3) {
        collectedReports.agent3 = r3.report || '';
        collectedTraces.agent3 = r3.trace || [];
        setReports(prev => ({ ...prev, agent3: r3.report || '' }));
        setTraces(prev => ({ ...prev, agent3: r3.trace || [] }));
      }

      setWorkflowState('saving');
      addLog('💾', lang === 'zh' ? '儲存報告至雲端...' : 'Saving report...');
      await api('save_report', {
        company: trimmedCompany,
        lang,
        ownerGroup: userGroup,
        ownerRole: userRole,
        agent1: collectedReports.agent1,
        agent2: collectedReports.agent2,
        agent3: collectedReports.agent3,
        agent1Trace: collectedTraces.agent1,
        agent2Trace: collectedTraces.agent2,
        agent3Trace: collectedTraces.agent3,
        ragContext: context,
        options: { optNews, newsYears, optIR, optFile },
      }, authToken);

      setSavedMsg(t.report_saved);
      addLog('🎉', lang === 'zh' ? '全部完成！' : 'All done!');
      setWorkflowState('done');
    } catch (err) {
      setErrorMsg(`${t.err_api} ${err.message || ''}`.trim());
      addLog('❌', err.message || 'Error');
      setWorkflowState('error');
    }
  };

  const getStatusUI = (agentState) => {
    const states = ['idle', 'search', 'rag', 'agent1', 'agent2', 'agent3', 'saving', 'done', 'error'];
    const curIdx = states.indexOf(workflowState);
    const agtIdx = states.indexOf(agentState);
    if (workflowState === 'error') return <span className="text-red-500 text-sm">暫停</span>;
    if (curIdx > agtIdx) return <span className="text-green-600 dark:text-green-400 font-bold flex items-center gap-1"><IconCheck /> {t.status_done}</span>;
    if (curIdx === agtIdx) return <span className="text-amber-600 dark:text-amber-400 font-bold flex items-center gap-1"><IconLoader /> {t.status_thinking}</span>;
    return <span className="text-slate-400 text-sm">{t.status_idle}</span>;
  };

  if (!authToken) return <LoginScreen onLogin={handleLogin} lang={lang} setLang={setLang} />;

  return (
    <div className="flex flex-col h-full min-h-screen">
      <header className="sticky top-0 z-50 bg-primary text-white shadow-md border-b border-secondary/30 guard-ui">
        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
          <div className="flex items-center gap-3 cursor-pointer group" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
            <div className="p-2 bg-secondary/20 rounded-lg hidden sm:block group-hover:bg-secondary/40 transition-colors protected-graphic" draggable="false"><IconBot /></div>
            <div className="flex flex-col">
              <div className="flex items-center gap-2"><span className="font-black text-xl tracking-wider text-white group-hover:text-secondary transition-colors">{t.brand}</span><span className="hidden md:inline-block w-px h-4 bg-secondary/50"></span><span className="text-[10px] sm:text-xs text-secondary/90 font-medium px-2 py-0.5 bg-secondary/10 rounded-full border border-secondary/20">{t.subtitle}</span></div>
              <h1 className="font-serif font-bold text-sm sm:text-base md:text-lg text-secondary leading-tight mt-0.5">{t.title} <span className="hidden lg:inline text-[11px] font-sans opacity-70 ml-2 font-normal tracking-wide">{t.title_en_sub}</span></h1>
            </div>
          </div>
          <div className="hidden md:flex items-center gap-2">
            <a href="https://lolopodcast.github.io/SMMC-Executive-Hub/" target="_blank" rel="noreferrer" className="flex items-center gap-1 text-xs text-secondary/80 hover:text-white transition-colors mr-2 border border-secondary/30 px-2 py-1 rounded"><IconLink /> SMMC Hub</a>
            <button onClick={() => setLang(l => l === 'zh' ? 'en' : 'zh')} className="px-3 py-1.5 text-xs font-bold bg-white/10 hover:bg-white/20 rounded-lg transition-colors">{lang === 'zh' ? 'EN' : '中文'}</button>
            <button onClick={() => setIsDark(d => !d)} className="p-2 hover:bg-white/10 rounded-lg transition-colors">{isDark ? <IconSun /> : <IconMoon />}</button>
            <button onClick={handleLogout} className="flex items-center gap-1 px-2 py-1.5 text-xs text-secondary/70 hover:text-white transition-colors"><IconLogOut /> <span className="hidden lg:inline">{t.logout}</span></button>
          </div>
          <div className="md:hidden flex items-center">
            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 hover:bg-white/10 rounded-lg transition-colors text-secondary">
              {isMobileMenuOpen ? <IconX /> : <IconMenu />}
            </button>
          </div>
        </div>
        {isMobileMenuOpen && (
          <div className="md:hidden bg-primary dark:bg-slate-900 border-b border-secondary/20 px-6 py-5 shadow-xl flex flex-col gap-5 animate-fade-in absolute w-full top-16 left-0 z-40">
            <a href="https://lolopodcast.github.io/SMMC-Executive-Hub/" target="_blank" rel="noreferrer" className="flex items-center gap-2 text-sm text-white hover:text-secondary transition-colors border-b border-white/10 pb-4"><IconLink /> SMMC Hub</a>
            <div className="flex items-center justify-between">
              <span className="text-sm font-medium text-white/80">Language</span>
              <button onClick={() => { setLang(l => l === 'zh' ? 'en' : 'zh'); setIsMobileMenuOpen(false); }} className="px-4 py-2 text-xs font-bold bg-white/10 hover:bg-white/20 rounded-lg text-white">{lang === 'zh' ? 'English' : '中文'}</button>
            </div>
            <div className="flex items-center justify-between">
              <span className="text-sm font-medium text-white/80">Theme</span>
              <button onClick={() => { setIsDark(d => !d); setIsMobileMenuOpen(false); }} className="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg flex items-center gap-2 text-xs font-bold text-white">{isDark ? <><IconSun /> Light</> : <><IconMoon /> Dark</>}</button>
            </div>
            <button onClick={() => { handleLogout(); setIsMobileMenuOpen(false); }} className="flex items-center gap-2 text-sm text-red-300 hover:text-red-100 transition-colors pt-2 border-t border-white/10"><IconLogOut /> {t.logout}</button>
          </div>
        )}
      </header>

      <div className="bg-secondary/10 dark:bg-secondary/5 border-b border-secondary/20 py-2 px-4 text-center">
        <p className="text-xs sm:text-sm text-primary dark:text-secondary flex items-center justify-center gap-2"><IconLink /> {t.smmc_hub}<a href="https://lolopodcast.github.io/SMMC-Executive-Hub/" target="_blank" rel="noreferrer" className="underline font-bold hover:text-primary/70 ml-1">({lang === 'zh' ? '點此登入' : 'Login'})</a></p>
      </div>

      <div className="max-w-7xl mx-auto w-full px-4 sm:px-6 pt-4 flex items-center justify-between flex-wrap gap-2">
        <div className="flex gap-1 bg-slate-200 dark:bg-slate-700 rounded-xl p-1 w-fit">
          <button onClick={() => setActiveTab('new')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${activeTab === 'new' ? 'bg-white dark:bg-slate-800 text-primary dark:text-secondary shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><IconBot /> {t.tab_new}</button>
          <button onClick={() => setActiveTab('history')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${activeTab === 'history' ? 'bg-white dark:bg-slate-800 text-primary dark:text-secondary shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><IconHistory /> {t.tab_history}</button>
          {isAdmin && <button onClick={() => setActiveTab('admin')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${activeTab === 'admin' ? 'bg-white dark:bg-slate-800 text-primary dark:text-secondary shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>⚙ {t.tab_admin}</button>}
        </div>
        <div className="flex items-center gap-2"><span className={`text-xs px-3 py-1 rounded-full font-bold ${isAdmin ? 'bg-primary/20 text-primary dark:bg-secondary/20 dark:text-secondary' : isTA ? 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300' : 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300'}`}>{isAdmin ? 'Professor' : isTA ? 'TA' : userGroup || 'Student'}</span></div>
      </div>

      <main className="flex-1 max-w-7xl mx-auto w-full p-4 sm:p-6">
        {activeTab === 'admin' && isAdmin ? (
          <AdminPanel authToken={authToken} lang={lang} t={t} />
        ) : activeTab === 'history' ? (
          <div className="animate-fade-in">
            <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm">
              <div className="flex items-center gap-3 mb-6"><IconHistory /><h2 className="font-serif font-bold text-primary dark:text-secondary text-xl">{t.history_title}</h2></div>
              <div className="flex gap-2 mb-6">
                <input type="text" value={historySearch} onChange={e => setHistorySearch(e.target.value)} onKeyDown={e => e.key === 'Enter' && loadHistory()} placeholder={t.history_search_ph} className="w-full px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-primary/50 outline-none text-sm dark:text-white" />
                <button onClick={loadHistory} className="px-4 py-2 bg-primary dark:bg-secondary text-white dark:text-primary rounded-xl text-sm font-bold hover:opacity-90"><IconSearch /></button>
              </div>
              {historyLoading ? <div className="flex items-center justify-center py-12 text-slate-400"><IconLoader /><span className="ml-2">Loading...</span></div> : historyList.length === 0 ? <p className="text-center text-slate-400 py-12">{t.history_empty}</p> : <div className="space-y-3">{historyList.map(r => <div key={r.id} className="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-700/50 rounded-xl border border-slate-200 dark:border-slate-600 hover:border-primary/30 dark:hover:border-secondary/30 transition-colors"><div><p className="font-bold text-sm text-primary dark:text-secondary">{r.company}</p><p className="text-xs text-slate-400 mt-1">{new Date(`${r.created_at}Z`).toLocaleString()} · {r.lang.toUpperCase()}</p></div><button onClick={() => loadReport(r.id)} className="px-4 py-2 text-xs font-bold bg-primary/10 dark:bg-secondary/10 text-primary dark:text-secondary rounded-lg hover:bg-primary/20 dark:hover:bg-secondary/20 transition-colors">{t.history_load}</button></div>)}</div>}
            </div>
          </div>
        ) : (
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fade-in">
            <div className="lg:col-span-4 space-y-6 flex flex-col">
              <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm shrink-0">
                <h2 className="font-serif font-bold text-primary dark:text-secondary mb-4 text-lg">1. Target Company</h2>
                <input type="text" value={company} onChange={e => setCompany(e.target.value)} disabled={isWorking} placeholder={t.ph_company} className="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-primary/50 outline-none transition-all dark:text-white" />
                <div className="mt-4 mb-6 space-y-3 bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                  <h3 className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">{t.data_source_title}</h3>
                  <label className="flex items-start gap-2 cursor-pointer group"><input type="checkbox" checked={optNews} onChange={e => setOptNews(e.target.checked)} disabled={isWorking} className="mt-1 rounded text-primary focus:ring-primary/50" /><div className="flex flex-col"><span className="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-primary dark:group-hover:text-secondary transition-colors">{t.opt_news}</span>{optNews && <div className="mt-1 flex items-center gap-2 text-xs"><span className="text-slate-500">{t.news_years}</span><select value={newsYears} onChange={e => setNewsYears(Number(e.target.value))} className="bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded px-1 py-0.5 outline-none cursor-pointer">{[1,2,3,4,5].map(y => <option key={y} value={y}>{y} {t.news_years_suffix}</option>)}</select></div>}</div></label>
                  <label className="flex items-start gap-2 cursor-pointer group"><input type="checkbox" checked={optIR} onChange={e => setOptIR(e.target.checked)} disabled={isWorking} className="mt-1 rounded text-primary focus:ring-primary/50" /><span className="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-primary dark:group-hover:text-secondary transition-colors leading-tight pt-0.5">{t.opt_ir}</span></label>
                  <label className="flex items-start gap-2 cursor-pointer group"><input type="checkbox" checked={optFile} onChange={e => setOptFile(e.target.checked)} disabled={isWorking} className="mt-1 rounded text-primary focus:ring-primary/50" /><div className="flex flex-col w-full"><span className="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-primary dark:group-hover:text-secondary transition-colors pt-0.5">{t.opt_file}</span>{optFile && <div className="mt-2 space-y-2"><input type="file" multiple accept=".txt,.md,.csv,.json,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx" onChange={handleFileUpload} disabled={isWorking} className="block w-full text-xs text-slate-500 file:mr-2 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-primary/10 file:text-primary" />{uploadedFiles.length > 0 && <div className="text-[10px] text-green-600 dark:text-green-400">{lang === 'zh' ? `已選擇 ${uploadedFiles.length} 個檔案` : `${uploadedFiles.length} files selected`}</div>}<p className="text-[10px] text-slate-400">{t.file_support}</p></div>}</div></label>
                </div>
                <button onClick={runWorkflow} disabled={isWorking} className="w-full py-3 rounded-xl font-bold transition-all flex justify-center items-center gap-2 bg-primary dark:bg-secondary text-white dark:text-primary hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed shadow-md hover:shadow-lg">{isWorking ? <><IconLoader /> {t.processing}</> : t.start_btn}</button>
                {errorMsg && <div className="mt-4 p-3 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-sm rounded-lg flex items-start gap-2 border border-red-200 dark:border-red-800/30"><IconAlert /><p>{errorMsg}</p></div>}
                {savedMsg && <div className="mt-4 p-3 bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 text-sm rounded-lg flex items-center gap-2 border border-green-200 dark:border-green-800/30"><IconCheck /><p>{savedMsg}</p></div>}
              </div>

              <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm relative overflow-hidden flex-1">
                <div className="absolute top-0 right-0 w-24 h-24 bg-primary/5 dark:bg-secondary/5 rounded-bl-full pointer-events-none"></div>
                <h2 className="font-serif font-bold text-primary dark:text-secondary mb-6 text-lg">2. Agentic Workflow</h2>
                <div className="space-y-6 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-300 dark:before:via-slate-600 before:to-transparent">
                  <div className="relative flex items-center justify-between group">
                    <div className="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white dark:border-slate-800 bg-slate-200 dark:bg-slate-700 text-slate-500 shadow shrink-0 z-10 transition-colors"><span className="text-sm font-bold">🔍</span></div>
                    <div className="w-[calc(100%-4rem)] bg-slate-50 dark:bg-slate-700/50 p-3 rounded-xl border border-slate-200 dark:border-slate-600 shadow-sm">
                      <p className="font-bold text-sm text-slate-700 dark:text-slate-300 mb-1">Web Search + RAG</p>
                      <div className="text-xs">{workflowState === 'search' ? <span className="text-amber-600 flex items-center gap-1"><IconLoader /> {t.status_search}</span> : workflowState === 'rag' ? <span className="text-amber-600 flex items-center gap-1"><IconLoader /> {t.status_rag}</span> : !['idle', 'error'].includes(workflowState) ? <span className="text-green-600 dark:text-green-400 flex items-center gap-1"><IconCheck /> Retrieved</span> : <span className="text-slate-400">Waiting</span>}</div>
                    </div>
                  </div>
                  {[{ id: 'agent1', name: t.agent1, icon: 'TP1' }, { id: 'agent2', name: t.agent2, icon: 'TP2' }, { id: 'agent3', name: t.agent3, icon: 'TP3' }].map(agt => (
                    <div key={agt.id} className="relative flex items-center justify-between group">
                      <div className={`flex items-center justify-center w-10 h-10 rounded-full border-4 border-white dark:border-slate-800 shadow shrink-0 z-10 transition-colors ${reports[agt.id] ? 'bg-primary dark:bg-secondary text-white dark:text-primary' : 'bg-slate-200 dark:bg-slate-700 text-slate-500'}`}><span className="text-xs font-bold">{agt.icon}</span></div>
                      <div className="w-[calc(100%-4rem)] bg-slate-50 dark:bg-slate-700/50 p-3 rounded-xl border border-slate-200 dark:border-slate-600 shadow-sm">
                        <p className="font-bold text-xs text-slate-700 dark:text-slate-300 mb-1 leading-tight">{agt.name}</p>
                        <div className="text-xs">{getStatusUI(agt.id)}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm shrink-0">
                <div className="flex items-center gap-2 text-primary dark:text-secondary mb-4"><IconBookOpen /><h2 className="font-serif font-bold text-lg">{t.reminders_title}</h2></div>
                <div className="space-y-3">{t.reminders.map(rem => { const isOpen = activeReminder === rem.id; return <div key={rem.id} className="border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden bg-slate-50 dark:bg-slate-900/30"><button onClick={() => setActiveReminder(isOpen ? null : rem.id)} className="w-full flex items-center justify-between p-4 text-left hover:bg-slate-100 dark:hover:bg-slate-800/50 transition-colors"><span className={`font-bold text-sm ${isOpen ? 'text-primary dark:text-secondary' : 'text-slate-700 dark:text-slate-300'}`}>{rem.title}</span><span className="text-slate-400 dark:text-slate-500">{isOpen ? <IconChevronUp /> : <IconChevronDown />}</span></button>{isOpen && <div className="p-4 pt-1 border-t border-slate-200 dark:border-slate-700 animate-fade-in bg-white dark:bg-slate-800/50"><ul className="list-disc list-outside ml-4 space-y-2 text-xs text-slate-600 dark:text-slate-400 leading-relaxed">{rem.items.map((item, i) => <li key={i}>{item}</li>)}</ul></div>}</div>; })}</div>
              </div>
            </div>

            <div className="lg:col-span-8 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col h-[600px] lg:h-[calc(100vh-14rem)] overflow-hidden">
              <div className="bg-primary/5 dark:bg-secondary/5 px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center shrink-0">
                <h2 className="font-serif font-bold text-primary dark:text-secondary text-xl">3. Comprehensive Strategy Report</h2>
                <div className="flex items-center gap-3">
                  {viewingReport && <span className="text-xs text-slate-400 hidden sm:block">{new Date(`${viewingReport.created_at}Z`).toLocaleString()}</span>}
                  {workflowState === 'done' && (
                    <>
                      <span className="hidden sm:flex bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400 text-xs px-3 py-1.5 rounded-full font-bold items-center gap-1 shadow-sm"><IconCheck /> Complete</span>
                      {canExport && (
                        <>
                          <button onClick={exportReport} className="flex items-center gap-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs px-3 py-1.5 rounded-full font-bold shadow-sm transition-all dark:bg-slate-700 dark:text-slate-300 dark:hover:bg-slate-600"><IconDownload /> .md</button>
                          <button onClick={exportPDF} className="flex items-center gap-1.5 bg-primary hover:bg-primary/90 text-white text-xs px-4 py-1.5 rounded-full font-bold shadow-sm transition-all dark:bg-secondary dark:text-primary dark:hover:bg-secondary/90"><IconDownload /> PDF</button>
                        </>
                      )}
                    </>
                  )}
                </div>
              </div>
              <div className="flex-1 overflow-y-auto p-6 scroll-smooth">
                {workflowState === 'idle' && <div className="h-full flex flex-col items-center justify-center text-slate-400 opacity-60"><p className="font-medium text-lg">{t.report_placeholder_title}</p><p className="text-sm mt-2">{t.report_placeholder_desc}</p></div>}
                {ragContext && !['idle', 'error'].includes(workflowState) && <div className="mb-8 p-4 bg-amber-50 dark:bg-amber-900/10 border-l-4 border-amber-400 rounded-r-lg text-sm text-amber-800 dark:text-amber-200 animate-fade-in shadow-sm"><strong className="block mb-1">🔍 [{t.rag_label}]:</strong><span className="opacity-90 text-xs whitespace-pre-wrap">{ragContext.length > 800 ? `${ragContext.substring(0, 800)}...` : ragContext}</span></div>}

                {!reports.agent1 && workflowState === 'agent1' && <div className="mb-10 animate-fade-in"><div className="inline-block bg-blue-100 dark:bg-blue-900/40 text-blue-800 dark:text-blue-200 px-4 py-1.5 rounded-full text-sm font-bold mb-4 shadow-sm border border-blue-200 dark:border-blue-800">{t.agent1}</div><div className="p-5 rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/40"><div className="animate-pulse space-y-3"><div className="h-4 bg-slate-200 dark:bg-slate-700 rounded w-1/3"></div><div className="h-3 bg-slate-200 dark:bg-slate-700 rounded w-full"></div><div className="h-3 bg-slate-200 dark:bg-slate-700 rounded w-5/6"></div><div className="h-3 bg-slate-200 dark:bg-slate-700 rounded w-4/6"></div></div><p className="mt-4 text-xs text-slate-400">{t.skeleton_agent1}</p></div><div className="my-8 border-b-2 border-dashed border-slate-200 dark:border-slate-700"></div></div>}
                {reports.agent1 && <div className="mb-10 animate-fade-in"><div className="inline-block bg-blue-100 dark:bg-blue-900/40 text-blue-800 dark:text-blue-200 px-4 py-1.5 rounded-full text-sm font-bold mb-4 shadow-sm border border-blue-200 dark:border-blue-800">{t.agent1}</div><div className="markdown-body" dangerouslySetInnerHTML={{ __html: renderMarkdown(reports.agent1 || '') }} /><div className="my-8 border-b-2 border-dashed border-slate-200 dark:border-slate-700"></div></div>}

                {!reports.agent2 && workflowState === 'agent2' && <div className="mb-10 animate-fade-in"><div className="inline-block bg-purple-100 dark:bg-purple-900/40 text-purple-800 dark:text-purple-200 px-4 py-1.5 rounded-full text-sm font-bold mb-4 shadow-sm border border-purple-200 dark:border-purple-800">{t.agent2}</div><div className="p-5 rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/40"><div className="animate-pulse space-y-3"><div className="h-4 bg-slate-200 dark:bg-slate-700 rounded w-1/3"></div><div className="h-3 bg-slate-200 dark:bg-slate-700 rounded w-full"></div><div className="h-3 bg-slate-200 dark:bg-slate-700 rounded w-5/6"></div><div className="h-3 bg-slate-200 dark:bg-slate-700 rounded w-4/6"></div></div><p className="mt-4 text-xs text-slate-400">{t.skeleton_agent2}</p></div><div className="my-8 border-b-2 border-dashed border-slate-200 dark:border-slate-700"></div></div>}
                {reports.agent2 && <div className="mb-10 animate-fade-in"><div className="inline-block bg-purple-100 dark:bg-purple-900/40 text-purple-800 dark:text-purple-200 px-4 py-1.5 rounded-full text-sm font-bold mb-4 shadow-sm border border-purple-200 dark:border-purple-800">{t.agent2}</div><div className="markdown-body" dangerouslySetInnerHTML={{ __html: renderMarkdown(reports.agent2 || '') }} /><div className="my-8 border-b-2 border-dashed border-slate-200 dark:border-slate-700"></div></div>}

                {!reports.agent3 && workflowState === 'agent3' && <div className="mb-6 animate-fade-in"><div className="inline-block bg-primary/20 dark:bg-secondary/20 text-primary dark:text-secondary px-4 py-1.5 rounded-full text-sm font-bold mb-4 shadow-sm border border-primary/30 dark:border-secondary/30">{t.agent3}</div><div className="p-5 rounded-2xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/40"><div className="animate-pulse space-y-3"><div className="h-4 bg-slate-200 dark:bg-slate-700 rounded w-1/3"></div><div className="h-3 bg-slate-200 dark:bg-slate-700 rounded w-full"></div><div className="h-3 bg-slate-200 dark:bg-slate-700 rounded w-5/6"></div><div className="h-3 bg-slate-200 dark:bg-slate-700 rounded w-4/6"></div></div><p className="mt-4 text-xs text-slate-400">{t.skeleton_agent3}</p></div></div>}
                {reports.agent3 && <div className="mb-6 animate-fade-in"><div className="inline-block bg-primary/20 dark:bg-secondary/20 text-primary dark:text-secondary px-4 py-1.5 rounded-full text-sm font-bold mb-4 shadow-sm border border-primary/30 dark:border-secondary/30">{t.agent3}</div><div className="markdown-body" dangerouslySetInnerHTML={{ __html: renderMarkdown(reports.agent3 || '') }} /></div>}

                {['search', 'rag', 'agent1', 'agent2', 'agent3', 'saving'].includes(workflowState) && <div className="p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 shadow-sm animate-fade-in">{canSeeTrace ? <><div className="flex items-center gap-3 mb-3"><IconLoader /><span className="text-sm font-bold text-primary dark:text-secondary">Agent Live Trace</span><span className="text-xs text-slate-400 ml-auto">{reactLog.length} events</span></div><div className="max-h-64 overflow-y-auto space-y-1.5 text-xs font-mono">{reactLog.length === 0 ? <div className="flex items-center gap-2 text-slate-400 animate-pulse"><span>⏳</span><span>{workflowState === 'search' ? t.status_search : workflowState === 'rag' ? t.status_rag : 'Initializing workflow...'}</span></div> : reactLog.slice(-20).map((ev, i) => <div key={i} className="flex items-start gap-2 py-1 px-2 rounded bg-white dark:bg-slate-900/50"><span>{ev.icon}</span><span>{ev.msg}</span></div>)}</div></> : <div className="flex items-center gap-2 text-slate-400"><IconLoader /> {workflowState === 'search' ? t.status_search : workflowState === 'rag' ? t.status_rag : t.status_thinking}</div>}</div>}
              </div>
            </div>
          </div>
        )}
      </main>

      <footer className="bg-primary text-white mt-auto border-t border-secondary/20 h-16 guard-ui">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 h-full">
          <div className="flex h-full items-center justify-between gap-6">
            <div className="min-w-0">
              <div className="flex items-center gap-3">
                <div className="p-2 bg-secondary/20 rounded-lg protected-graphic" draggable="false"><IconBot /></div>
                <div className="min-w-0">
                  <p className="font-serif font-bold text-base text-secondary truncate">{t.brand}</p>
                  <p className="text-xs text-white/70 truncate">{t.footer_desc}</p>
                </div>
              </div>
            </div>
            <div className="text-right text-sm text-white/80 leading-tight shrink-0">
              <p><span className="text-secondary font-semibold">{t.architect_label}</span> <a href={t.architect_url} target="_blank" rel="noreferrer" className="hover:text-secondary underline underline-offset-2">{t.architect_name}</a></p>
              <p className="text-xs text-white/60 mt-1">{t.footer_version}</p>
            </div>
          </div>
        </div>
      </footer>
    </div>
  );
}

console.assert(typeof friendlyHttpError === 'function', 'friendlyHttpError should exist');
console.assert(friendlyHttpError(401) === '登入驗證失敗（401）。請重新確認 Token。', '401 message should match');
console.assert(safeParseJson('{"ok":true}').ok === true, 'safeParseJson should parse valid JSON');
console.assert(safeParseJson('bad-json') === null, 'safeParseJson should return null for invalid JSON');

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
