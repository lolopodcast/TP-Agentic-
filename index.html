const API_BASE = 'https://smmc-strategy-api.YOUR_ACCOUNT.workers.dev'; // ← 替換成你的 Worker URL

const api = async (action, data = {}, token = '') => {
  const resp = await fetch(API_BASE + '/api', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, token, ...data }),
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
    throw new Error(err.error || `HTTP ${resp.status}`);
  }
  return resp.json();
};

const apiSSE = (data, token, onEvent) => {
  return new Promise((resolve, reject) => {
    fetch(API_BASE + '/api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'analyze', token, ...data }),
    }).then(resp => {
      if (!resp.ok) { reject(new Error('HTTP ' + resp.status)); return; }
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let result = null;
      function pump() {
        reader.read().then(({ done, value }) => {
          if (done) { resolve(result); return; }
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const evt = JSON.parse(line.slice(6));
                if (evt.type === 'react_complete') result = evt;
                if (evt.type === 'react_fatal') reject(new Error(evt.error));
                if (evt.type !== 'stream_end') onEvent(evt);
              } catch(e) {}
            }
          }
          pump();
        }).catch(reject);
      }
      pump();
    }).catch(reject);
  });
};

/* ===== Login Screen ===== */
function LoginScreen({ onLogin, lang, setLang }) {
  const [token, setToken] = useState('');
  const [group, setGroup] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [isDark, setIsDark] = useState(false);
  const t = dict[lang];
  const groups = ['G1','G2','G3','G4','G5','G6','G7','G8','G9','G10','G11','G12'];

  useEffect(() => {
    if (isDark) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
  }, [isDark]);

  const handleLogin = async () => {
    if (!token.trim()) return;
    setLoading(true); setError('');
    try {
      const res = await api('auth', { token });
      if (res.ok) {
        const role = res.role || 'student';
        const finalGroup = role === 'student' ? group : (res.group || '');
        if (role === 'student' && !group) { setError(lang==='zh'?'請選擇組別':'Please select a group'); setLoading(false); return; }
        onLogin(token, role, finalGroup, res.label || '');
      } else { setError(res.error || t.login_err); }
    } catch(e) { setError(t.login_err); }
    setLoading(false);
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-[#f4f4f4] dark:bg-[#121212]">
      <div className="w-full max-w-md animate-fade-in">
        <div className="text-center mb-8">
          <div className="inline-flex items-center gap-3 mb-4">
            <div className="p-3 bg-primary/10 dark:bg-secondary/10 rounded-xl"><IconBot /></div>
            <span className="font-serif font-black text-3xl tracking-widest text-primary dark:text-secondary">{t.brand}</span>
          </div>
          <h1 className="font-serif font-bold text-xl text-primary dark:text-secondary">{t.title}</h1>
          <p className="text-sm text-slate-500 mt-1">{t.subtitle}</p>
        </div>
        <div className="bg-white dark:bg-slate-800 rounded-2xl p-8 border border-slate-200 dark:border-slate-700 shadow-lg">
          <div className="flex items-center gap-3 mb-6">
            <IconLock />
            <h2 className="font-serif font-bold text-lg text-primary dark:text-secondary">{t.login_title}</h2>
          </div>
          <input type="password" value={token} onChange={e => setToken(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleLogin()}
            placeholder={t.login_ph}
            className="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-primary/50 outline-none transition-all dark:text-white mb-4" />
          <div className="mb-4">
            <label className="text-sm font-medium text-slate-600 dark:text-slate-400 mb-1 block">{lang==='zh'?'組別 (學生必選)':'Group (required for students)'}</label>
            <select value={group} onChange={e => setGroup(e.target.value)}
              className="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-primary/50 outline-none dark:text-white">
              <option value="">{lang==='zh'?'— 請選擇組別 —':'— Select group —'}</option>
              {groups.map(g => <option key={g} value={g}>{g}</option>)}
              <option value="TA">TA</option>
              <option value="Professor">Professor</option>
            </select>
          </div>
          {error && <p className="text-red-500 text-sm mb-4 flex items-center gap-1"><IconAlert />{error}</p>}
          <button onClick={handleLogin} disabled={loading || !token.trim()}
            className="w-full py-3 rounded-xl font-bold bg-primary dark:bg-secondary text-white dark:text-primary hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed shadow-md flex justify-center items-center gap-2">
            {loading ? <><IconLoader /> {t.processing}</> : t.login_btn}
          </button>
          <p className="text-xs text-slate-400 mt-4 text-center">{t.login_hint}</p>
        </div>
        <div className="flex justify-center gap-2 mt-6">
          <button onClick={() => setLang(l => l === 'zh' ? 'en' : 'zh')}
            className="px-3 py-1.5 text-xs font-bold bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50">
            {lang === 'zh' ? 'EN' : '中文'}
          </button>
          <button onClick={() => setIsDark(d => !d)}
            className="p-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50">
            {isDark ? <IconSun /> : <IconMoon />}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ===== Admin Panel Component ===== */
function AdminPanel({ authToken, lang, t, api }) {
  const [adminTab, setAdminTab] = useState('tokens');
  const [tokens, setTokens] = useState([]);
  const [kbStats, setKbStats] = useState(null);
  const [usageStats, setUsageStats] = useState(null);
  const [loading, setLoading] = useState(false);

  // Token form
  const [newRole, setNewRole] = useState('student');
  const [newTokenVal, setNewTokenVal] = useState('');
  const [newLabel, setNewLabel] = useState('');
  const [newLimit, setNewLimit] = useState(10);
  const [newExpiry, setNewExpiry] = useState('');

  const loadTokens = async () => { setLoading(true); try { const r = await api('admin_get_tokens', {}, authToken); if(r.ok) setTokens(r.tokens||[]); } catch(e){} setLoading(false); };
  const loadKB = async () => { setLoading(true); try { const r = await api('admin_kb_stats', {}, authToken); if(r.ok) setKbStats(r); } catch(e){} setLoading(false); };
  const loadUsage = async () => { setLoading(true); try { const r = await api('admin_usage_stats', {}, authToken); if(r.ok) setUsageStats(r); } catch(e){} setLoading(false); };

  useEffect(() => {
    if (adminTab === 'tokens') loadTokens();
    else if (adminTab === 'kb') loadKB();
    else if (adminTab === 'usage') loadUsage();
  }, [adminTab]);

  const addToken = async () => {
    if (!newTokenVal.trim()) return;
    await api('admin_set_token', { role: newRole, tokenValue: newTokenVal, label: newLabel, dailyLimit: newLimit, expiresAt: newExpiry || '' }, authToken);
    setNewTokenVal(''); setNewLabel('');
    loadTokens();
  };

  const deleteToken = async (id) => {
    if (!confirm(lang==='zh'?'確定刪除此 Token？':'Delete this token?')) return;
    await api('admin_delete_token', { tokenId: id }, authToken);
    loadTokens();
  };

  const clearKB = async (company) => {
    const msg = company ? `清除「${company}」的知識庫？` : '清除全部知識庫？此操作不可復原。';
    if (!confirm(msg)) return;
    await api('admin_clear_kb', { company: company || undefined }, authToken);
    loadKB();
  };

  const tabBtn = (id, label) => (
    <button onClick={() => setAdminTab(id)} className={`px-4 py-2 text-sm font-bold rounded-lg transition-all ${adminTab===id?'bg-primary text-white dark:bg-secondary dark:text-primary':'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>{label}</button>

  return (
    <div className="animate-fade-in space-y-6">

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3 mb-6 p-4 bg-slate-50 dark:bg-slate-900/50 rounded-xl border border-slate-200 dark:border-slate-700">
            <select value={newRole} onChange={e => setNewRole(e.target.value)} className="px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-sm dark:text-white">
              <option value="student">Student</option>
              <option value="ta">TA</option>
            </select>
            <input placeholder="Token value" value={newTokenVal} onChange={e => setNewTokenVal(e.target.value)} className="px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-sm dark:text-white" />
            <input placeholder={lang==='zh'?'標籤 (如 全班/TA姓名)':'Label'} value={newLabel} onChange={e => setNewLabel(e.target.value)} className="px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-sm dark:text-white" />
            <div className="flex items-center gap-2">
              <input type="number" min="1" max="100" value={newLimit} onChange={e => setNewLimit(Number(e.target.value))} className="w-20 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-sm dark:text-white" />
              <span className="text-xs text-slate-400">{lang==='zh'?'次/天':'/day'}</span>
            </div>
            <div className="flex gap-2">
              <input type="date" value={newExpiry} onChange={e => setNewExpiry(e.target.value)} className="flex-1 px-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-sm dark:text-white" />
              <button onClick={addToken} className="px-4 py-2 bg-primary dark:bg-secondary text-white dark:text-primary rounded-lg text-sm font-bold hover:opacity-90 shrink-0">+</button>

          )}

      )}

      {adminTab === 'kb' && kbStats && (
        <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm">

          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">

            {(kbStats.byCategory||[]).map((c,i) => (
              <div key={i} className="bg-slate-50 dark:bg-slate-900/50 rounded-xl p-4 text-center"><p className="text-xl font-bold text-slate-600 dark:text-slate-300">{c.cnt}</p><p className="text-xs text-slate-400 mt-1">{c.category}</p></div>
            ))}
          </div>
          <h4 className="font-bold text-sm text-slate-600 dark:text-slate-400 mb-3">{lang==='zh'?'按企業分佈':'By company'}</h4>
          <div className="space-y-2 max-h-64 overflow-y-auto">
            {(kbStats.byCompany||[]).map((c,i) => (
              <div key={i} className="flex items-center justify-between p-2 bg-slate-50 dark:bg-slate-700/50 rounded-lg text-sm">
                <span><span className="font-bold">{c.company}</span> <span className="text-xs text-slate-400 ml-2">[{c.category}]</span></span>
                <div className="flex items-center gap-2">

          <button onClick={() => clearKB(null)} className="mt-4 px-4 py-2 bg-red-100 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-lg text-sm font-bold hover:bg-red-200 dark:hover:bg-red-900/40">{lang==='zh'?'清除全部知識庫':'Clear all KB'}</button>

    const files = Array.from(e.target.files);
    if (!files.length) { setUploadedFiles([]); setFileContents(''); return; }
    const filePromises = files.map(file => new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const base64 = ev.target.result.split(',')[1]; // strip data:...;base64, prefix
        resolve({ fileName: file.name, fileType: file.type, fileBase64: base64 });
      };
      reader.readAsDataURL(file);

    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });

    const printWin = window.open(url, '_blank');
    printWin.onload = () => { setTimeout(() => { printWin.print(); }, 500); };
  };

  const isWorking = !['idle','done','error'].includes(workflowState);

  /* ===== Main Workflow (SSE ReAct) ===== */
  const runWorkflow = async () => {
    if (!company.trim()) { setErrorMsg(t.err_empty); return; }
    setErrorMsg(''); setSavedMsg(''); setViewingReport(null);
    setReports({ agent1:'', agent2:'', agent3:'' });
    setReactLog([]);
    setTraces({ agent1: [], agent2: [], agent3: [] });
    const collectedReports = { agent1:'', agent2:'', agent3:'' };
    const collectedTraces = { agent1: [], agent2: [], agent3: [] };

    const addLog = (icon, msg) => setReactLog(prev => [...prev, { time: new Date().toLocaleTimeString(), icon, msg }]);

    const handleEvent = (evt) => {
      switch(evt.type) {
        case 'react_thinking':
          addLog('🧠', `${evt.agentId} — Round ${evt.round}/${evt.maxRounds} 思考中...`);
          break;
        case 'react_thought':
          addLog('💭', `${evt.agentId} — ${evt.thought}`);
          break;
        case 'react_action':
          const icons = { search:'🔍', lookup_kb:'📚', calculate:'🔢' };
          addLog(icons[evt.action]||'🔧', `${evt.agentId} → ${evt.action}("${evt.input}")`);
          break;
        case 'react_observation':
          addLog('📋', `${evt.agentId} ← ${evt.observation}`);
          break;
        case 'react_finish':
          addLog('✅', `${evt.agentId} — Round ${evt.round} finish: ${evt.thought}`);
          break;
        case 'react_error':
          addLog('⚠️', `${evt.agentId} — ${evt.error}`);
          break;
        case 'react_complete':
          // handled separately
          break;
      }
    };

    try {
      // Phase 0: Web search
      if (optNews || optIR) {
        setWorkflowState('search');
        addLog('🌐', lang==='zh'?`線上搜尋「${company}」資料中...`:`Searching "${company}" online...`);
        await api('search', { company, optNews, newsYears, optIR, lang }, authToken);
      }

      // Phase 0.5: Upload files (if any)
      if (optFile && uploadedFiles.length > 0) {
        addLog('📎', lang==='zh'?`上傳 ${uploadedFiles.length} 個檔案...`:`Uploading ${uploadedFiles.length} files...`);
        for (const f of uploadedFiles) {
          try {
            await api('file_upload', { company, fileName: f.fileName, fileType: f.fileType, fileBase64: f.fileBase64 }, authToken);
            addLog('✅', `${f.fileName} ${lang==='zh'?'解析完成':'parsed'}`);
          } catch (err) {
            addLog('⚠️', `${f.fileName} ${lang==='zh'?'解析失敗':'failed'}: ${err.message}`);
          }
        }
      }

      // Phase 1: RAG retrieve
      setWorkflowState('rag');
      addLog('🔍', lang==='zh'?'檢索知識庫...':'Retrieving knowledge base...');
      const ragRes = await api('rag_retrieve', { company }, authToken);
      let context = ragRes.context || (lang==='zh'?'知識庫無相符資料。':'No data found in KB.');
      setRagContext(context);

      let optPrompt = '';
      if (optNews) optPrompt += `\n- 著重整合過去 ${newsYears} 年新聞與市場動態。`;
      if (optIR) optPrompt += `\n- 著重官方網站與 IR 公開資訊。`;

      const langStr = lang==='zh'?'繁體中文（台灣用語）':'English';

      // Phase 2: Agent 1 (ReAct SSE)
      setWorkflowState('agent1');
      addLog('🚀', 'Agent 1 ReAct loop 啟動');
      const r1 = await apiSSE({
        company, agentId: 'agent1',
        agentRole: '資深總體經濟與產業分析師',
        taskPrompt: `分析對象: ${company}。\n${optPrompt}\n【任務】：\n1. TP0: 摘要公司歷史、願景與近年財務表現。\n2. TP1: PESTEL 分析（挑最關鍵 2-3 項）。\n3. TP1: 五力分析與產業價值鏈定位。\n4. 歸納 4P (Position, Priority, Posture, Profit potential)。\n語言：${langStr}`,
        ragContext: context,
      }, authToken, handleEvent);
      if (r1) {
        collectedReports.agent1 = r1.report;
        collectedTraces.agent1 = r1.trace || [];
        setReports(prev => ({...prev, agent1: r1.report}));
        setTraces(prev => ({...prev, agent1: r1.trace || []}));
      }

      // Phase 3: Agent 2 (ReAct SSE)
      setWorkflowState('agent2');
      addLog('🚀', 'Agent 2 ReAct loop 啟動');
      const r2 = await apiSSE({
        company, agentId: 'agent2',
        agentRole: '資深企業資源與價值鏈精算師',
        taskPrompt: `分析對象: ${company}。\n【Agent 1 報告節錄】: ${(collectedReports.agent1||'').substring(0,1500)}...\n【任務】：\n1. TP2: 核心事業與營收流向。\n2. TP2: 企業價值鏈拆解。\n3. TP2: 3-4 個關鍵資源 VRIN 評估。\n4. TP2: 動態能力 (Dynamic Capabilities)。\n語言：${langStr}`,
        ragContext: context,
      }, authToken, handleEvent);
      if (r2) {
        collectedReports.agent2 = r2.report;
        collectedTraces.agent2 = r2.trace || [];
        setReports(prev => ({...prev, agent2: r2.report}));
        setTraces(prev => ({...prev, agent2: r2.trace || []}));
      }

      // Phase 4: Agent 3 (ReAct SSE)
      setWorkflowState('agent3');
      addLog('🚀', 'Agent 3 ReAct loop 啟動');
      const r3 = await apiSSE({
        company, agentId: 'agent3',
        agentRole: '頂尖集團策略長 (CSO)',
        taskPrompt: `分析對象: ${company}。\n【Agent 1 節錄】: ${(collectedReports.agent1||'').substring(0,1000)}...\n【Agent 2 節錄】: ${(collectedReports.agent2||'').substring(0,1000)}...\n【任務】：\n1. TP3: 垂直整合/多角化/地理擴張的策略行動與進入模式。\n2. TP3: 2-3 點未來挑戰與高階策略建議。\n3. 考量 ESG、Agency problem。\n語言：${langStr}`,
        ragContext: context,
      }, authToken, handleEvent);
      if (r3) {
        collectedReports.agent3 = r3.report;
        collectedTraces.agent3 = r3.trace || [];
        setReports(prev => ({...prev, agent3: r3.report}));
        setTraces(prev => ({...prev, agent3: r3.trace || []}));
      }

      // Phase 5: Save
      setWorkflowState('saving');
      addLog('💾', lang==='zh'?'儲存報告至雲端...':'Saving report...');
      await api('save_report', {
        company, lang,
        ownerGroup: userGroup, ownerRole: userRole,
        agent1: collectedReports.agent1, agent2: collectedReports.agent2, agent3: collectedReports.agent3,
        agent1Trace: collectedTraces.agent1, agent2Trace: collectedTraces.agent2, agent3Trace: collectedTraces.agent3,
        ragContext: context, options: { optNews, newsYears, optIR, optFile }
      }, authToken);
      setSavedMsg(t.report_saved);
      addLog('🎉', lang==='zh'?'全部完成！':'All done!');
      setWorkflowState('done');
    } catch (err) {
      console.error(err);
      setErrorMsg(t.err_api + ' ' + err.message);
      addLog('❌', err.message);
      setWorkflowState('error');
    }
  };

  const getStatusUI = (agentState) => {
    const states = ['idle','search','rag','agent1','agent2','agent3','saving','done','error'];
    const curIdx = states.indexOf(workflowState);
    const agtIdx = states.indexOf(agentState);
    if (workflowState === 'error') return <span className="text-red-500 text-sm">暫停</span>;
    if (curIdx > agtIdx) return <span className="text-green-600 dark:text-green-400 font-bold flex items-center gap-1"><IconCheck/> {t.status_done}</span>;
    if (curIdx === agtIdx) return <span className="text-amber-600 dark:text-amber-400 font-bold flex items-center gap-1"><IconLoader/> {t.status_thinking}</span>;
    return <span className="text-slate-400 text-sm">{t.status_idle}</span>;
  };

  // Auth gate
  if (!authToken) {

            onClick={() => window.scrollTo({top:0,behavior:'smooth'})} title={lang==='zh'?'回到頂端':'Back to Top'}>

            <div className="flex flex-col">
              <div className="flex items-center gap-2">
                <span className="font-black text-xl tracking-wider text-white group-hover:text-secondary transition-colors">{t.brand}</span>
                <span className="hidden md:inline-block w-px h-4 bg-secondary/50"></span>

              </div>
              <h1 className="font-serif font-bold text-sm sm:text-base md:text-lg text-secondary leading-tight mt-0.5">
                {t.title} <span className="hidden lg:inline text-[11px] font-sans opacity-70 ml-2 font-normal tracking-wide">{t.title_en_sub}</span>
              </h1>
            </div>
          </div>
          <div className="hidden md:flex items-center gap-2">
            <a href="https://lolopodcast.github.io/SMMC-Executive-Hub/" target="_blank" rel="noreferrer"
              className="flex items-center gap-1 text-xs text-secondary/80 hover:text-white transition-colors mr-2 border border-secondary/30 px-2 py-1 rounded">
              <IconLink /> SMMC Hub
            </a>
            <button onClick={() => setLang(l => l==='zh'?'en':'zh')} className="px-3 py-1.5 text-xs font-bold bg-white/10 hover:bg-white/20 rounded-lg transition-colors">
              {lang==='zh'?'EN':'中文'}

            <button onClick={() => setIsDark(d=>!d)} className="p-2 hover:bg-white/10 rounded-lg transition-colors" title="Toggle Theme">
              {isDark ? <IconSun /> : <IconMoon />}
            </button>
            <button onClick={handleLogout} className="flex items-center gap-1 px-2 py-1.5 text-xs text-secondary/70 hover:text-white transition-colors" title={t.logout}>
              <IconLogOut /> <span className="hidden lg:inline">{t.logout}</span>
            </button>
          </div>
          <div className="md:hidden flex items-center">
            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 hover:bg-white/10 rounded-lg transition-colors text-secondary">
              {isMobileMenuOpen ? <IconX /> : <IconMenu />}

        {isMobileMenuOpen && (

            </div>

            </button>

          <button onClick={() => setActiveTab('new')}
            className={`px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${activeTab==='new'?'bg-white dark:bg-slate-800 text-primary dark:text-secondary shadow-sm':'text-slate-500 hover:text-slate-700'}`}>
            <IconBot /> {t.tab_new}
          </button>
          <button onClick={() => setActiveTab('history')}
            className={`px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${activeTab==='history'?'bg-white dark:bg-slate-800 text-primary dark:text-secondary shadow-sm':'text-slate-500 hover:text-slate-700'}`}>
            <IconHistory /> {t.tab_history}

            <button onClick={() => setActiveTab('admin')}
              className={`px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 ${activeTab==='admin'?'bg-white dark:bg-slate-800 text-primary dark:text-secondary shadow-sm':'text-slate-500 hover:text-slate-700'}`}>
              ⚙ Admin
            </button>
          )}
        </div>
        <div className="flex items-center gap-2">
          <span className={`text-xs px-3 py-1 rounded-full font-bold ${isAdmin?'bg-primary/20 text-primary dark:bg-secondary/20 dark:text-secondary':isTA?'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300':'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300'}`}>
            {isAdmin?'Professor':isTA?'TA':userGroup||'Student'}

      {/* Main Content */}

          <div className="animate-fade-in">
            <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm">
              <div className="flex items-center gap-3 mb-6">
                <IconHistory />
                <h2 className="font-serif font-bold text-primary dark:text-secondary text-xl">{t.history_title}</h2>
              </div>

                  <label className="flex items-start gap-2 cursor-pointer group">
                    <input type="checkbox" checked={optFile} onChange={e => setOptFile(e.target.checked)} disabled={isWorking} className="mt-1 rounded text-primary focus:ring-primary/50" />
                    <div className="flex flex-col w-full">
                      <span className="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-primary dark:group-hover:text-secondary transition-colors pt-0.5">{t.opt_file}</span>
                      {optFile && (
                        <div className="mt-2">
                          <input type="file" multiple accept=".txt,.md,.csv,.json,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx" onChange={handleFileUpload} disabled={isWorking}
                            className="block w-full text-xs text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-primary/10 file:text-primary hover:file:bg-primary/20 dark:file:bg-secondary/20 dark:file:text-secondary transition-all cursor-pointer" />
                          <p className="text-[10px] text-slate-400 mt-1">{t.file_support}</p>
                        </div>
                      )}
                    </div>
                  </label>
                </div>

                <button onClick={runWorkflow} disabled={isWorking}
                  className="w-full py-3 rounded-xl font-bold transition-all flex justify-center items-center gap-2 bg-primary dark:bg-secondary text-white dark:text-primary hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed shadow-md hover:shadow-lg">
                  {isWorking ? <><IconLoader/> {t.processing}</> : t.start_btn}
                </button>

                {errorMsg && (
                  <div className="mt-4 p-3 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-sm rounded-lg flex items-start gap-2 border border-red-200 dark:border-red-800/30">
                    <IconAlert className="shrink-0 mt-0.5" /><p>{errorMsg}</p>
                  </div>
                )}
                {savedMsg && (
                  <div className="mt-4 p-3 bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 text-sm rounded-lg flex items-center gap-2 border border-green-200 dark:border-green-800/30">
                    <IconCheck /><p>{savedMsg}</p>
                  </div>
                )}
              </div>

              {/* Workflow Tracker */}
              <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm relative overflow-hidden flex-1">
                <div className="absolute top-0 right-0 w-24 h-24 bg-primary/5 dark:bg-secondary/5 rounded-bl-full pointer-events-none"></div>
                <h2 className="font-serif font-bold text-primary dark:text-secondary mb-6 text-lg">2. Agentic Workflow</h2>
                <div className="space-y-6 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-300 dark:before:via-slate-600 before:to-transparent">
                  {/* Search step */}
                  <div className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group">
                    <div className="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white dark:border-slate-800 bg-slate-200 dark:bg-slate-700 text-slate-500 shadow shrink-0 z-10 transition-colors">
                      <span className="text-sm font-bold">🔍</span>
                    </div>
                    <div className="w-[calc(100%-4rem)] bg-slate-50 dark:bg-slate-700/50 p-3 rounded-xl border border-slate-200 dark:border-slate-600 shadow-sm">
                      <p className="font-bold text-sm text-slate-700 dark:text-slate-300 mb-1">Web Search + RAG</p>
                      <div className="text-xs">
                        {workflowState === 'search' ? <span className="text-amber-600 flex items-center gap-1"><IconLoader/> {t.status_search}</span>
                          : workflowState === 'rag' ? <span className="text-amber-600 flex items-center gap-1"><IconLoader/> {t.status_rag}</span>
                          : !['idle','error'].includes(workflowState) ? <span className="text-green-600 dark:text-green-400 flex items-center gap-1"><IconCheck/> Retrieved</span>
                          : <span className="text-slate-400">Waiting</span>}
                      </div>
                    </div>
                  </div>
                  {/* Agent steps */}
                  {[{id:'agent1',name:t.agent1,icon:'TP1'},{id:'agent2',name:t.agent2,icon:'TP2'},{id:'agent3',name:t.agent3,icon:'TP3'}].map(agt => (
                    <div key={agt.id} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group">
                      <div className={`flex items-center justify-center w-10 h-10 rounded-full border-4 border-white dark:border-slate-800 shadow shrink-0 z-10 transition-colors
                        ${reports[agt.id]?'bg-primary dark:bg-secondary text-white dark:text-primary':'bg-slate-200 dark:bg-slate-700 text-slate-500'}`}>
                        <span className="text-xs font-bold">{agt.icon}</span>
                      </div>
                      <div className="w-[calc(100%-4rem)] bg-slate-50 dark:bg-slate-700/50 p-3 rounded-xl border border-slate-200 dark:border-slate-600 shadow-sm">
                        <p className="font-bold text-xs text-slate-700 dark:text-slate-300 mb-1 leading-tight">{agt.name}</p>
                        <div className="text-xs">{getStatusUI(agt.id)}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* TP0-TP3 Reference Accordion */}
              <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm shrink-0">
                <div className="flex items-center gap-2 text-primary dark:text-secondary mb-4">
                  <IconBookOpen />
                  <h2 className="font-serif font-bold text-lg">{t.reminders_title}</h2>
                </div>
                <div className="space-y-3">
                  {t.reminders.map(rem => {
                    const isOpen = activeReminder === rem.id;
                    return (
                      <div key={rem.id} className="border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden bg-slate-50 dark:bg-slate-900/30">
                        <button onClick={() => setActiveReminder(isOpen?null:rem.id)}
                          className="w-full flex items-center justify-between p-4 text-left hover:bg-slate-100 dark:hover:bg-slate-800/50 transition-colors focus:outline-none">
                          <span className={`font-bold text-sm ${isOpen?'text-primary dark:text-secondary':'text-slate-700 dark:text-slate-300'}`}>{rem.title}</span>
                          <span className="text-slate-400 dark:text-slate-500">{isOpen ? <IconChevronUp /> : <IconChevronDown />}</span>
                        </button>
                        {isOpen && (
                          <div className="p-4 pt-1 border-t border-slate-200 dark:border-slate-700 animate-fade-in bg-white dark:bg-slate-800/50">
                            <ul className="list-disc list-outside ml-4 space-y-2 text-xs text-slate-600 dark:text-slate-400 leading-relaxed">
                              {rem.items.map((item,i) => <li key={i}>{item}</li>)}
                            </ul>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Right Column: Report Output */}
            <div className="lg:col-span-8 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col h-[600px] lg:h-[calc(100vh-14rem)] overflow-hidden">
              <div className="bg-primary/5 dark:bg-secondary/5 px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center shrink-0">
                <h2 className="font-serif font-bold text-primary dark:text-secondary text-xl">3. Comprehensive Strategy Report</h2>
                <div className="flex items-center gap-3">
                  {viewingReport && (
                    <span className="text-xs text-slate-400 hidden sm:block">
                      {new Date(viewingReport.created_at+'Z').toLocaleString()}
                    </span>
                  )}
                  {workflowState === 'done' && (
                    <>
                      <span className="hidden sm:flex bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400 text-xs px-3 py-1.5 rounded-full font-bold items-center gap-1 shadow-sm"><IconCheck/> Complete</span>
                      {canExport && (
                        <>
                          <button onClick={exportReport} className="flex items-center gap-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs px-3 py-1.5 rounded-full font-bold shadow-sm transition-all dark:bg-slate-700 dark:text-slate-300 dark:hover:bg-slate-600">
                            <IconDownload /> .md
                          </button>
                          <button onClick={exportPDF} className="flex items-center gap-1.5 bg-primary hover:bg-primary/90 text-white text-xs px-4 py-1.5 rounded-full font-bold shadow-sm transition-all dark:bg-secondary dark:text-primary dark:hover:bg-secondary/90">
                            <IconDownload /> PDF
                          </button>
                        </>
                      )}
                    </>
                  )}
                </div>
              </div>
              <div className="flex-1 overflow-y-auto p-6 scroll-smooth">
                {workflowState === 'idle' && (
                  <div className="h-full flex flex-col items-center justify-center text-slate-400 opacity-60">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" className="mb-4 text-slate-300 dark:text-slate-600"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <p className="font-medium text-lg">{t.report_placeholder_title}</p>
                    <p className="text-sm mt-2">{t.report_placeholder_desc}</p>
                  </div>
                )}
                {ragContext && !['idle','error'].includes(workflowState) && (
                  <div className="mb-8 p-4 bg-amber-50 dark:bg-amber-900/10 border-l-4 border-amber-400 rounded-r-lg text-sm text-amber-800 dark:text-amber-200 animate-fade-in shadow-sm">
                    <strong className="block mb-1">🔍 [{t.rag_label}]:</strong>
                    <span className="opacity-90 text-xs whitespace-pre-wrap">{ragContext.length > 800 ? ragContext.substring(0,800) + '...' : ragContext}</span>
                  </div>
                )}
                {reports.agent1 && (
                  <div className="mb-10 animate-fade-in">
                    <div className="inline-block bg-blue-100 dark:bg-blue-900/40 text-blue-800 dark:text-blue-200 px-4 py-1.5 rounded-full text-sm font-bold mb-4 shadow-sm border border-blue-200 dark:border-blue-800">{t.agent1}</div>
                    <div className="markdown-body" dangerouslySetInnerHTML={{__html:marked.parse(reports.agent1)}} />
                    <div className="my-8 border-b-2 border-dashed border-slate-200 dark:border-slate-700"></div>
                  </div>
                )}
                {reports.agent2 && (
                  <div className="mb-10 animate-fade-in">
                    <div className="inline-block bg-purple-100 dark:bg-purple-900/40 text-purple-800 dark:text-purple-200 px-4 py-1.5 rounded-full text-sm font-bold mb-4 shadow-sm border border-purple-200 dark:border-purple-800">{t.agent2}</div>
                    <div className="markdown-body" dangerouslySetInnerHTML={{__html:marked.parse(reports.agent2)}} />
                    <div className="my-8 border-b-2 border-dashed border-slate-200 dark:border-slate-700"></div>
                  </div>
                )}
                {reports.agent3 && (
                  <div className="mb-6 animate-fade-in">
                    <div className="inline-block bg-primary/20 dark:bg-secondary/20 text-primary dark:text-secondary px-4 py-1.5 rounded-full text-sm font-bold mb-4 shadow-sm border border-primary/30 dark:border-secondary/30">{t.agent3}</div>
                    <div className="markdown-body" dangerouslySetInnerHTML={{__html:marked.parse(reports.agent3)}} />
                  </div>
                )}
                {['search','rag','agent1','agent2','agent3','saving'].includes(workflowState) && (
                  <div className="p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 shadow-sm animate-fade-in">
                    {canSeeTrace ? (
                      <>
                        <div className="flex items-center gap-3 mb-3">
                          <IconLoader className="text-primary dark:text-secondary" />
                          <span className="text-sm font-bold text-primary dark:text-secondary">
                            ReAct Agent Live Trace
                          </span>
                          <span className="text-xs text-slate-400 ml-auto">{reactLog.length} events</span>
                        </div>
                        <div className="max-h-64 overflow-y-auto space-y-1.5 text-xs font-mono">
                          {reactLog.length === 0 ? (
                            <div className="flex items-center gap-2 text-slate-400 animate-pulse">
                              <span>⏳</span><span>{workflowState === 'search' ? t.status_search : workflowState === 'rag' ? t.status_rag : 'Initializing ReAct loop...'}</span>
                            </div>
                          ) : reactLog.slice(-20).map((ev, i) => (
                            <div key={i} className={`flex items-start gap-2 py-1 px-2 rounded ${
                              ev.icon === '🔍' || ev.icon === '📚' || ev.icon === '🔢' ? 'bg-amber-50 dark:bg-amber-900/10 text-amber-700 dark:text-amber-300' :
                              ev.icon === '✅' || ev.icon === '🎉' ? 'bg-green-50 dark:bg-green-900/10 text-green-700 dark:text-green-300' :
                              ev.icon === '❌' || ev.icon === '⚠️' ? 'bg-red-50 dark:bg-red-900/10 text-red-600 dark:text-red-400' :
                              'text-slate-600 dark:text-slate-400'
                            }`}>
                              <span className="shrink-0">{ev.icon}</span>
                              <span className="break-all leading-relaxed">
                                <span className="text-slate-400 mr-1">[{ev.time}]</span>
                                {ev.msg}
                              </span>
                            </div>
                          ))}
                        </div>
                      </>
                    ) : (
                      <div className="flex items-center gap-3">
                        <IconLoader className="text-primary dark:text-secondary" />
                        <span className="text-sm font-bold text-slate-500 dark:text-slate-400">
                          {workflowState === 'search' ? t.status_search
                            : workflowState === 'rag' ? t.status_rag
                            : workflowState === 'agent1' ? t.skeleton_agent1
                            : workflowState === 'agent2' ? t.skeleton_agent2
                            : workflowState === 'agent3' ? t.skeleton_agent3
                            : t.status_saving}
                        </span>
                      </div>
                    )}
                    {/* Skeleton bars */}
                    <div className="mt-3 space-y-2 animate-pulse">
                      <div className="h-2 bg-slate-200 dark:bg-slate-700 rounded w-full"></div>
                      <div className="h-2 bg-slate-200 dark:bg-slate-700 rounded w-4/6"></div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}
      </main>

      {/* Footer */}
      <footer className="bg-white dark:bg-[#0a0a0a] border-t border-slate-200 dark:border-slate-800 mt-12 py-10 shrink-0">
        <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
          <div className="flex flex-col gap-3 max-w-md">
            <div className="flex items-center gap-2 text-primary dark:text-secondary cursor-pointer hover:opacity-80 transition-opacity"
              onClick={() => window.scrollTo({top:0,behavior:'smooth'})}>
              <IconBot /><span className="font-black text-2xl tracking-wider">{t.brand}</span>
            </div>
            <p className="text-sm text-slate-500 dark:text-slate-400 leading-relaxed font-medium">{t.footer_desc}</p>
          </div>
          <div className="flex flex-wrap gap-x-8 gap-y-3 text-sm font-bold text-slate-600 dark:text-slate-300">
            <a href="#" className="hover:text-primary dark:hover:text-secondary transition-colors">{t.menu_home}</a>
            <a href="#" className="hover:text-primary dark:hover:text-secondary transition-colors">{t.menu_about}</a>
            <a href="#" className="hover:text-primary dark:hover:text-secondary transition-colors">{t.menu_contact}</a>
            <a href="#" className="hover:text-primary dark:hover:text-secondary transition-colors">{t.menu_privacy}</a>
          </div>
        </div>
        <div className="max-w-7xl mx-auto px-6 mt-10 pt-6 border-t border-slate-100 dark:border-slate-800 text-xs text-slate-500 dark:text-slate-400 flex flex-col md:flex-row justify-between items-center gap-4">
          <div className="flex items-center gap-3">
            <p className="font-medium bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded">{t.footer_version}</p>
            <p className="hidden md:block">|</p>
            <p>{t.footer_rights}</p>
          </div>
          <div className="flex flex-col sm:flex-row items-center gap-4">
            <p>{t.architect_label} <a href={t.architect_url} target="_blank" rel="noreferrer" className="font-bold hover:text-primary dark:hover:text-secondary underline transition-colors">{t.architect_name}</a></p>
            <button onClick={() => window.scrollTo({top:0,behavior:'smooth'})}
              className="flex items-center gap-1 font-bold hover:text-primary dark:hover:text-secondary transition-colors bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 px-3 py-1.5 rounded-full shadow-sm sm:ml-2">
              Top <IconArrowUp />
            </button>
          </div>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
