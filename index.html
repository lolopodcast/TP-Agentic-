/* ===== API 呼叫模組 (具備指數退避重試機制) ===== */
const callGeminiWithRetry = async (systemPrompt, userPrompt, retryCount = 0) => {
  const delays = [1000, 2000, 4000, 8000, 16000];
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

  const payload = {
    contents: [{ parts: [{ text: userPrompt }] }],
    systemInstruction: { parts: [{ text: systemPrompt }] }
  };

  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!response.ok) {
      throw new Error(`API 請求失敗: ${response.status}`);
    }

    const data = await response.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  } catch (error) {
    if (retryCount < delays.length) {
      console.warn(`API 錯誤，將於 ${delays[retryCount]} 毫秒後重試 (${retryCount + 1}/${delays.length})...`);
      await new Promise(resolve => setTimeout(resolve, delays[retryCount]));
      return callGeminiWithRetry(systemPrompt, userPrompt, retryCount + 1);
    }
    throw new Error("API 呼叫失敗，已達最大重試次數。");
  }
};

    }

        allText += `\n--- 匯入文件: ${file.name} ---\n${event.target.result}\n`;

      };

    const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `${company}_SMMC策略分析報告.md`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  const runWorkflow = async () => {
    if (!company.trim()) {
        setErrorMsg(t.err_empty);
        return;
    }

    setErrorMsg('');
    setReports({ agent1: '', agent2: '', agent3: '' });
    
    try {
      // ===== 階段 0: RAG 檢索 =====
      setWorkflowState('rag');
      await new Promise(r => setTimeout(r, 1200)); 
      const foundData = MOCK_KNOWLEDGE_BASE.find(db => db.keywords.some(k => company.toUpperCase().includes(k.toUpperCase())));
      let context = foundData ? foundData.data : (lang === 'zh' ? "本地資料庫無相符資料，請依賴您的通用知識庫進行推論分析。" : "No local data found. Rely on your general knowledge for analysis.");
      
      // 將匯入的文件內容加入 Context
      if (optFile && fileContents) {
          context += `\n\n【使用者匯入外部資料】：\n${fileContents}`;
      }
      setRagContext(context);

      // 動態構建選項指令 Prompt
      let optionsPrompt = "";
      if (optNews) optionsPrompt += `\n- 請特別著重搜尋並整合該企業過去 ${newsYears} 年內的最新網路新聞與市場動態。`;
      if (optIR) optionsPrompt += `\n- 請模擬檢視並著重分析該公司的官方網站 (About 頁面) 以及投資人關係 (Investor Relations, IR) 分頁的公開資訊與財報指引。`;

      // ===== 階段 1: Agent 1 (產業分析師) =====
      setWorkflowState('agent1');
      const sys1 = `你是一位資深的「總體經濟與產業分析師」。語言：${lang==='zh'?'繁體中文(台灣用語)':'English'}。絕對不使用中國大陸的簡體中文用語(如：項目、數據庫、視頻、賦能等)，請使用台灣標準用語(如：專案、資料庫、影片、賦予能力等)。請根據課綱完成 TP0與TP1。輸出需結構化(使用 Markdown)。`;
      const prompt1 = `分析對象: ${company}。
      【內部參考資料(RAG)】: ${context}
      【動態設定要求】: ${optionsPrompt}
      【任務要求】:
      1. TP0: 摘要公司歷史、願景與近年財務表現概況。
      2. TP1: 進行最關鍵的 PESTEL 總體環境分析(挑選最關鍵的2-3項即可)。
      3. TP1: 進行五力分析(Five Forces)與產業價值鏈定位。
      4. 結論: 歸納該公司的 4P (Position, Priority, Posture, Profit potential)。`;
      
      const res1 = await callGeminiWithRetry(sys1, prompt1);
      setReports(prev => ({ ...prev, agent1: res1 }));

      // ===== 階段 2: Agent 2 (資源精算師) - Context Chaining =====
      setWorkflowState('agent2');
      const sys2 = `你是一位資深的「企業資源與價值鏈精算師」。語言：${lang==='zh'?'繁體中文(台灣用語)':'English'}。絕對不使用簡體中文用語。請接續前一階段分析師的報告，完成 TP2 分析。`;
      const prompt2 = `分析對象: ${company}。
      【Agent 1(產業分析師)報告節錄】: ${res1.substring(0, 1500)}...
      【任務要求】:
      1. TP2: 分析核心事業與產品線的營收流向。
      2. TP2: 拆解企業價值鏈(Corporate Value Chain)的關鍵活動。
      3. TP2: 找出3-4個關鍵資源(有形/無形)，並用 VRIN 架構評估其核心能耐。
      4. TP2: 指出其近期的「動態能力(Dynamic Capabilities)」。`;
      
      const res2 = await callGeminiWithRetry(sys2, prompt2);
      setReports(prev => ({ ...prev, agent2: res2 }));

      // ===== 階段 3: Agent 3 (策略長) - Context Chaining =====
      setWorkflowState('agent3');
      const sys3 = `你是一位頂尖的「集團策略長(CSO)」。語言：${lang==='zh'?'繁體中文(台灣用語)':'English'}。絕對不使用簡體中文用語。請綜合前兩個階段的產出，完成最後的高階策略建議 (TP3)。`;
      const prompt3 = `分析對象: ${company}。
      【Agent 1 報告節錄】: ${res1.substring(0, 1000)}...
      【Agent 2 報告節錄】: ${res2.substring(0, 1000)}...
      【任務要求】:
      1. TP3: 分析其近年在「垂直整合(VI)」、「產品多角化(HD)」或「地理區域擴張(GE)」的集團策略行動與進入模式(併購、聯盟或自建)。
      2. TP3: 基於企業生命週期，針對未來創新與轉型，提出 2-3 點具體挑戰與高階策略建議。
      3. 需考量內外部利害關係人(如 ESG, Agency problem 等議題)。`;
      
      const res3 = await callGeminiWithRetry(sys3, prompt3);
      setReports(prev => ({ ...prev, agent3: res3 }));

      setWorkflowState('done');
    } catch (error) {
      console.error(error);
      setErrorMsg(t.err_api + " " + error.message);
      setWorkflowState('error');
    }
  };

  const getStatusUI = (agentState) => {
    const states = ['idle', 'rag', 'agent1', 'agent2', 'agent3', 'done', 'error'];
    const curIdx = states.indexOf(workflowState);
    const agtIdx = states.indexOf(agentState);
    
    if (workflowState === 'error') return <span className="text-red-500 text-sm">暫停</span>;
    if (curIdx > agtIdx) return <span className="text-green-600 dark:text-green-400 font-bold flex items-center gap-1"><IconCheck/> {t.status_done}</span>;
    if (curIdx === agtIdx) return <span className="text-amber-600 dark:text-amber-400 font-bold flex items-center gap-1"><IconLoader/> {t.status_thinking}</span>;
    return <span className="text-slate-400 text-sm">{t.status_idle}</span>;
  };

  return (
    <div className="flex flex-col h-full min-h-screen">
      {/* 導覽列 Navbar */}
      <header className="sticky top-0 z-50 bg-primary text-white shadow-md border-b border-secondary/30">
        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
          <div 
            className="flex items-center gap-3 cursor-pointer group"
            onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
            title={lang === 'zh' ? '回到頂端' : 'Back to Top'}
          >
            <div className="p-2 bg-secondary/20 rounded-lg hidden sm:block group-hover:bg-secondary/40 transition-colors"><IconBot /></div>
            <div className="flex flex-col">
              <div className="flex items-center gap-2">
                <span className="font-black text-xl tracking-wider text-white group-hover:text-secondary transition-colors">{t.brand}</span>
                <span className="hidden md:inline-block w-px h-4 bg-secondary/50"></span>
                <span className="text-[10px] sm:text-xs text-secondary/90 font-medium px-2 py-0.5 bg-secondary/10 rounded-full border border-secondary/20">{t.subtitle}</span>
              </div>
              <h1 className="font-serif font-bold text-sm sm:text-base md:text-lg text-secondary leading-tight mt-0.5">
                {t.title} <span className="hidden lg:inline text-[11px] font-sans opacity-70 ml-2 font-normal tracking-wide">{t.title_en_sub}</span>
              </h1>
            </div>
          </div>
          
          {/* 桌面版操作列 */}
          <div className="hidden md:flex items-center gap-2">
            <a href="https://lolopodcast.github.io/SMMC-Executive-Hub/" target="_blank" rel="noreferrer" className="flex items-center gap-1 text-xs text-secondary/80 hover:text-white transition-colors mr-2 border border-secondary/30 px-2 py-1 rounded">
              <IconLink /> SMMC Hub
            </a>
            <button onClick={() => setLang(l => l === 'zh' ? 'en' : 'zh')} className="px-3 py-1.5 text-xs font-bold bg-white/10 hover:bg-white/20 rounded-lg transition-colors">
              {lang === 'zh' ? 'EN' : '中文'}
            </button>
            <button onClick={() => setIsDark(d => !d)} className="p-2 hover:bg-white/10 rounded-lg transition-colors" title="Toggle Theme">
              {isDark ? <IconSun /> : <IconMoon />}
            </button>
          </div>

          {/* 手機版漢堡按鈕 */}
          <div className="md:hidden flex items-center">
            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 hover:bg-white/10 rounded-lg transition-colors text-secondary">
              {isMobileMenuOpen ? <IconX /> : <IconMenu />}
            </button>
          </div>
        </div>

        {/* 手機版展開漢堡目錄 */}
        {isMobileMenuOpen && (
          <div className="md:hidden bg-primary dark:bg-slate-900 border-b border-secondary/20 px-6 py-5 shadow-xl flex flex-col gap-5 animate-fade-in absolute w-full top-16 left-0 z-40">
            <a href="https://lolopodcast.github.io/SMMC-Executive-Hub/" target="_blank" rel="noreferrer" className="flex items-center gap-2 text-sm text-white hover:text-secondary transition-colors border-b border-white/10 pb-4">
              <IconLink /> 前往 SMMC Hub
            </a>
            <div className="flex items-center justify-between">
              <span className="text-sm font-medium text-white/80">介面語言 (Language)</span>
              <button onClick={() => { setLang(l => l === 'zh' ? 'en' : 'zh'); setIsMobileMenuOpen(false); }} className="px-4 py-2 text-xs font-bold bg-white/10 hover:bg-white/20 rounded-lg transition-colors text-white">
                {lang === 'zh' ? '切換至 English' : 'Switch to 中文'}
              </button>
            </div>
            <div className="flex items-center justify-between pt-2">
              <span className="text-sm font-medium text-white/80">深色模式 (Theme)</span>
              <button onClick={() => { setIsDark(d => !d); setIsMobileMenuOpen(false); }} className="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg transition-colors flex items-center gap-2 text-xs font-bold text-white">
                {isDark ? <><IconSun /> 淺色外觀</> : <><IconMoon /> 深色外觀</>}
              </button>
            </div>
          </div>
        )}
      </header>

      {/* 新增：SMMC Hub 橫幅提示 */}
      <div className="bg-secondary/10 dark:bg-secondary/5 border-b border-secondary/20 py-2 px-4 text-center">
        <p className="text-xs sm:text-sm text-primary dark:text-secondary flex items-center justify-center gap-2">
          <IconLink /> {t.smmc_hub} 
          <a href="https://lolopodcast.github.io/SMMC-Executive-Hub/" target="_blank" rel="noreferrer" className="underline font-bold hover:text-primary/70 ml-1">
            (點此登入)
          </a>
        </p>
      </div>

      {/* 主體版面 Layout */}
      <main className="flex-1 max-w-7xl mx-auto w-full p-4 sm:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        {/* 左側欄：控制台與狀態追蹤 (Control & Workflow Status) */}
        <div className="lg:col-span-4 space-y-6 flex flex-col">
          
          {/* 輸入面板 */}
          <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm shrink-0">
            <h2 className="font-serif font-bold text-primary dark:text-secondary mb-4 text-lg">1. Target Company</h2>
            <input 
              type="text" 
              value={company} 
              onChange={e => setCompany(e.target.value)} 
              disabled={workflowState !== 'idle' && workflowState !== 'done' && workflowState !== 'error'}
              placeholder={t.ph_company}
              className="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-primary/50 outline-none transition-all dark:text-white" 
            />
            
            {/* 新增：資料來源選項設定 */}
            <div className="mt-4 mb-6 space-y-3 bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
              <h3 className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">資料來源設定</h3>
              
              {/* 選項 1: 網路新聞 */}
              <label className="flex items-start gap-2 cursor-pointer group">
                <input type="checkbox" checked={optNews} onChange={e => setOptNews(e.target.checked)} disabled={workflowState !== 'idle' && workflowState !== 'done' && workflowState !== 'error'} className="mt-1 rounded text-primary focus:ring-primary/50" />
                <div className="flex flex-col">
                  <span className="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-primary dark:group-hover:text-secondary transition-colors">{t.opt_news}</span>
                  {optNews && (
                    <div className="mt-1 flex items-center gap-2 text-xs">
                      <span className="text-slate-500">檢索範圍：過去</span>
                      <select value={newsYears} onChange={e => setNewsYears(Number(e.target.value))} className="bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded px-1 py-0.5 outline-none cursor-pointer">
                        {[1,2,3,4,5].map(y => <option key={y} value={y}>{y} 年內</option>)}
                      </select>
                    </div>
                  )}
                </div>
              </label>

              {/* 選項 2: 官網 / IR */}
              <label className="flex items-start gap-2 cursor-pointer group">
                <input type="checkbox" checked={optIR} onChange={e => setOptIR(e.target.checked)} disabled={workflowState !== 'idle' && workflowState !== 'done' && workflowState !== 'error'} className="mt-1 rounded text-primary focus:ring-primary/50" />
                <span className="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-primary dark:group-hover:text-secondary transition-colors leading-tight pt-0.5">{t.opt_ir}</span>
              </label>

              {/* 選項 3: 本地資料庫 / 檔案匯入 */}
              <label className="flex items-start gap-2 cursor-pointer group">
                <input type="checkbox" checked={optFile} onChange={e => setOptFile(e.target.checked)} disabled={workflowState !== 'idle' && workflowState !== 'done' && workflowState !== 'error'} className="mt-1 rounded text-primary focus:ring-primary/50" />
                <div className="flex flex-col w-full">
                  <span className="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-primary dark:group-hover:text-secondary transition-colors pt-0.5">{t.opt_file}</span>
                  {optFile && (
                    <div className="mt-2">
                      <input type="file" multiple accept=".txt,.md,.csv,.json" onChange={handleFileUpload} disabled={workflowState !== 'idle' && workflowState !== 'done' && workflowState !== 'error'}
                        className="block w-full text-xs text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-primary/10 file:text-primary hover:file:bg-primary/20 dark:file:bg-secondary/20 dark:file:text-secondary transition-all cursor-pointer" />
                      <p className="text-[10px] text-slate-400 mt-1">支援 .txt, .md 等純文字格式匯入</p>
                    </div>
                  )}
                </div>
              </label>
            </div>

            <button 
              onClick={runWorkflow} 
              disabled={workflowState !== 'idle' && workflowState !== 'done' && workflowState !== 'error'}
              className="w-full py-3 rounded-xl font-bold transition-all flex justify-center items-center gap-2 bg-primary dark:bg-secondary text-white dark:text-primary hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed shadow-md hover:shadow-lg"
            >
              {(workflowState !== 'idle' && workflowState !== 'done' && workflowState !== 'error') 
                ? <><IconLoader/> 協同處理中...</> 
                : t.start_btn}
            </button>

            {/* 錯誤訊息提示 */}
            {errorMsg && (
              <div className="mt-4 p-3 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-sm rounded-lg flex items-start gap-2 border border-red-200 dark:border-red-800/30">
                <IconAlert className="shrink-0 mt-0.5" />
                <p>{errorMsg}</p>
              </div>
            )}
          </div>

          {/* 工作流追蹤器 */}
          <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm relative overflow-hidden flex-1">
            <div className="absolute top-0 right-0 w-24 h-24 bg-primary/5 dark:bg-secondary/5 rounded-bl-full pointer-events-none"></div>
            <h2 className="font-serif font-bold text-primary dark:text-secondary mb-6 text-lg">2. Agentic Workflow</h2>
            
            <div className="space-y-6 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-300 dark:before:via-slate-600 before:to-transparent">
              
              {/* RAG 步驟 */}
              <div className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group">
                <div className="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white dark:border-slate-800 bg-slate-200 dark:bg-slate-700 text-slate-500 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10 transition-colors">
                  <span className="text-sm font-bold">DB</span>
                </div>
                <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] bg-slate-50 dark:bg-slate-700/50 p-3 rounded-xl border border-slate-200 dark:border-slate-600 shadow-sm">
                  <p className="font-bold text-sm text-slate-700 dark:text-slate-300 mb-1">Local RAG</p>
                  <div className="text-xs">
                    {workflowState === 'rag' 
                      ? <span className="text-amber-600 flex items-center gap-1"><IconLoader/> {t.status_rag}</span> 
                      : (workflowState !== 'idle' && workflowState !== 'error' ? <span className="text-green-600 dark:text-green-400 flex items-center gap-1"><IconCheck/> Retrieved</span> : <span className="text-slate-400">Waiting</span>)}
                  </div>
                </div>
              </div>

              {/* Agents 步驟 */}
              {[{id:'agent1', name: t.agent1, icon: 'TP1'}, {id:'agent2', name: t.agent2, icon: 'TP2'}, {id:'agent3', name: t.agent3, icon: 'TP3'}].map((agt) => (
                <div key={agt.id} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group">
                  <div className={`flex items-center justify-center w-10 h-10 rounded-full border-4 border-white dark:border-slate-800 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10 transition-colors
                    ${reports[agt.id] ? 'bg-primary dark:bg-secondary text-white dark:text-primary' : 'bg-slate-200 dark:bg-slate-700 text-slate-500'}`}>
                    <span className="text-xs font-bold">{agt.icon}</span>
                  </div>
                  <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] bg-slate-50 dark:bg-slate-700/50 p-3 rounded-xl border border-slate-200 dark:border-slate-600 shadow-sm">
                    <p className="font-bold text-xs text-slate-700 dark:text-slate-300 mb-1 leading-tight">{agt.name}</p>
                    <div className="text-xs">{getStatusUI(agt.id)}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* 新增：TP0~TP3 分析架構參考區塊 (手風琴式下拉) */}
          <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm shrink-0">
            <div className="flex items-center gap-2 text-primary dark:text-secondary mb-4">
              <IconBookOpen />
              <h2 className="font-serif font-bold text-lg">{t.reminders_title}</h2>
            </div>
            
            <div className="space-y-3">
              {t.reminders.map((rem) => {
                const isOpen = activeReminder === rem.id;
                return (
                  <div key={rem.id} className="border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden bg-slate-50 dark:bg-slate-900/30">
                    <button 
                      onClick={() => setActiveReminder(isOpen ? null : rem.id)}
                      className="w-full flex items-center justify-between p-4 text-left hover:bg-slate-100 dark:hover:bg-slate-800/50 transition-colors focus:outline-none"
                    >
                      <span className={`font-bold text-sm ${isOpen ? 'text-primary dark:text-secondary' : 'text-slate-700 dark:text-slate-300'}`}>
                        {rem.title}
                      </span>
                      <span className="text-slate-400 dark:text-slate-500">
                        {isOpen ? <IconChevronUp /> : <IconChevronDown />}
                      </span>
                    </button>
                    
                    {isOpen && (
                      <div className="p-4 pt-1 border-t border-slate-200 dark:border-slate-700 animate-fade-in bg-white dark:bg-slate-800/50">
                        <ul className="list-disc list-outside ml-4 space-y-2 text-xs text-slate-600 dark:text-slate-400 leading-relaxed">
                          {rem.items.map((item, i) => (
                            <li key={i}>{item}</li>
                          ))}
                        </ul>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

        </div>

        {/* 右側欄：互動式報告輸出區 (Interactive Report Output) */}
        <div className="lg:col-span-8 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col h-[600px] lg:h-[calc(100vh-10rem)] overflow-hidden">
          
          <div className="bg-primary/5 dark:bg-secondary/5 px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center shrink-0">
            <h2 className="font-serif font-bold text-primary dark:text-secondary text-xl">3. Comprehensive Strategy Report</h2>
            
            {/* 新增：匯出按鈕區域 */}
            <div className="flex items-center gap-3">
              {workflowState === 'done' && (
                <>
                  <span className="hidden sm:flex bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400 text-xs px-3 py-1.5 rounded-full font-bold items-center gap-1 shadow-sm"><IconCheck/> Analysis Complete</span>
                  <button onClick={exportReport} className="flex items-center gap-1.5 bg-primary hover:bg-primary/90 text-white text-xs px-4 py-1.5 rounded-full font-bold shadow-sm transition-all dark:bg-secondary dark:text-primary dark:hover:bg-secondary/90">
                    <IconDownload /> {t.export_btn}
                  </button>
                </>
              )}
            </div>
          </div>
          
          <div className="flex-1 overflow-y-auto p-6 scroll-smooth custom-scrollbar">
            
            {/* 閒置狀態畫面 */}
            {workflowState === 'idle' && (
              <div className="h-full flex flex-col items-center justify-center text-slate-400 opacity-60">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" className="mb-4 text-slate-300 dark:text-slate-600"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <p className="font-medium text-lg">{lang === 'zh' ? '請在左側輸入企業名稱啟動分析' : 'Please input a company name on the left'}</p>
                <p className="text-sm mt-2">{lang === 'zh' ? '各 Agent 將在此接力呈現報告結果' : 'Agent reports will be presented here sequentially'}</p>
              </div>
            )}

            {/* 知識庫檢索結果提示 */}
            {ragContext && workflowState !== 'idle' && workflowState !== 'error' && (
              <div className="mb-8 p-4 bg-amber-50 dark:bg-amber-900/10 border-l-4 border-amber-400 rounded-r-lg text-sm text-amber-800 dark:text-amber-200 animate-fade-in shadow-sm">
                <strong className="block mb-1">🔍 [Context Injected from Local Knowledge Base]:</strong> 
                <span className="opacity-90">{ragContext}</span>
              </div>
            )}

            {/* Agent 1 報告 */}
            {reports.agent1 && (
              <div className="mb-10 animate-fade-in">
                <div className="inline-block bg-blue-100 dark:bg-blue-900/40 text-blue-800 dark:text-blue-200 px-4 py-1.5 rounded-full text-sm font-bold mb-4 shadow-sm border border-blue-200 dark:border-blue-800">{t.agent1}</div>
                <div className="markdown-body" dangerouslySetInnerHTML={{ __html: marked.parse(reports.agent1) }} />
                <div className="my-8 border-b-2 border-dashed border-slate-200 dark:border-slate-700"></div>
              </div>
            )}

            {/* Agent 2 報告 */}
            {reports.agent2 && (
              <div className="mb-10 animate-fade-in">
                <div className="inline-block bg-purple-100 dark:bg-purple-900/40 text-purple-800 dark:text-purple-200 px-4 py-1.5 rounded-full text-sm font-bold mb-4 shadow-sm border border-purple-200 dark:border-purple-800">{t.agent2}</div>
                <div className="markdown-body" dangerouslySetInnerHTML={{ __html: marked.parse(reports.agent2) }} />
                <div className="my-8 border-b-2 border-dashed border-slate-200 dark:border-slate-700"></div>
              </div>
            )}

            {/* Agent 3 報告 */}
            {reports.agent3 && (
              <div className="mb-6 animate-fade-in">
                <div className="inline-block bg-primary/20 dark:bg-secondary/20 text-primary dark:text-secondary px-4 py-1.5 rounded-full text-sm font-bold mb-4 shadow-sm border border-primary/30 dark:border-secondary/30">{t.agent3}</div>
                <div className="markdown-body" dangerouslySetInnerHTML={{ __html: marked.parse(reports.agent3) }} />
              </div>
            )}

            {/* 骨架屏載入動畫 (Skeleton Loader) */}
            {(workflowState === 'agent1' || workflowState === 'agent2' || workflowState === 'agent3') && (
              <div className="p-6 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 animate-pulse shadow-sm">
                <div className="flex items-center gap-3 mb-4">
                  <IconLoader className="text-primary dark:text-secondary" />
                  <span className="text-sm font-bold text-slate-500 dark:text-slate-400">
                    {workflowState === 'agent1' ? '產業分析師正在彙整總體環境資料...' : 
                     workflowState === 'agent2' ? '資源精算師正在評估核心能耐...' : 
                     '策略長正在擬定最終藍圖...'}
                  </span>
                </div>
                <div className="h-4 bg-slate-200 dark:bg-slate-700 rounded w-1/3 mb-4"></div>
                <div className="space-y-3">
                  <div className="h-3 bg-slate-200 dark:bg-slate-700 rounded w-full"></div>
                  <div className="h-3 bg-slate-200 dark:bg-slate-700 rounded w-5/6"></div>
                  <div className="h-3 bg-slate-200 dark:bg-slate-700 rounded w-4/6"></div>
                  <div className="h-3 bg-slate-200 dark:bg-slate-700 rounded w-full"></div>
                </div>
              </div>
            )}
          </div>
        </div>

      </main>

      {/* 頁尾 Footer */}
      <footer className="bg-white dark:bg-[#0a0a0a] border-t border-slate-200 dark:border-slate-800 mt-12 py-10 shrink-0">
        <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
          
          <div className="flex flex-col gap-3 max-w-md">
            <div 
              className="flex items-center gap-2 text-primary dark:text-secondary cursor-pointer hover:opacity-80 transition-opacity"
              onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
            >
              <IconBot />
              <span className="font-black text-2xl tracking-wider">{t.brand}</span>
            </div>
            <p className="text-sm text-slate-500 dark:text-slate-400 leading-relaxed font-medium">
              {t.footer_desc}
            </p>
          </div>
          
          <div className="flex flex-wrap gap-x-8 gap-y-3 text-sm font-bold text-slate-600 dark:text-slate-300">
            <a href="#" className="hover:text-primary dark:hover:text-secondary transition-colors">{t.menu_home}</a>
            <a href="#" className="hover:text-primary dark:hover:text-secondary transition-colors">{t.menu_about}</a>
            <a href="#" className="hover:text-primary dark:hover:text-secondary transition-colors">{t.menu_contact}</a>
            <a href="#" className="hover:text-primary dark:hover:text-secondary transition-colors">{t.menu_privacy}</a>
          </div>
        </div>
        
        <div className="max-w-7xl mx-auto px-6 mt-10 pt-6 border-t border-slate-100 dark:border-slate-800 text-xs text-slate-500 dark:text-slate-400 flex flex-col md:flex-row justify-between items-center gap-4">
          <div className="flex items-center gap-3">
            <p className="font-medium bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded">{t.footer_version}</p>
            <p className="hidden md:block">|</p>
            <p>{t.footer_rights}</p>
          </div>
          
          <div className="flex flex-col sm:flex-row items-center gap-4">
            <p>Architect: <a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo" target="_blank" rel="noreferrer" className="font-bold hover:text-primary dark:hover:text-secondary underline transition-colors">Prof. Shihmin Lo</a></p>
            <button 
              onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} 
              className="flex items-center gap-1 font-bold hover:text-primary dark:hover:text-secondary transition-colors bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 px-3 py-1.5 rounded-full shadow-sm sm:ml-2"
            >
              Top <IconArrowUp />
            </button>
          </div>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
